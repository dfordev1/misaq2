<main class="wrap hub-main">
  <div class="rule hub-rule"></div>
  <h1 class="hub-title">Lexicon</h1>
  <p class="hub-lede">Core covenant lexemes in the Mithaq paradigm.</p>
  <div class="hub-list" id="lex-list"></div>
</main>
<script>
(async function(){
  const d = await (await fetch('data/lexicon.json')).json();
  const host = document.getElementById('lex-list');
  d.terms.forEach(t=>{
    const art = document.createElement('article');
    art.className = 'hub-card';
    art.innerHTML = '<h2>'+t.title+'</h2><p class="hub-sum">'+t.summary+'</p><div class="hub-detail">'+t.html+'</div>';
    art.querySelector('h2').addEventListener('click', ()=> art.classList.toggle('open'));
    host.appendChild(art);
  });
})();
</script>
