<text x="400" y="176" text-anchor="middle" font-size="13.0" font-weight="bold" fill="#a45c40">held in amanah</text>
<circle cx="335" cy="232" r="31" fill="#ffffff" stroke="#a45c40" stroke-width="1.5"/>
<circle cx="335.0" cy="219.8" r="6.8" fill="#a45c40"/><path d="M 322.8 247.7 a 12.2 15.6 0 0 1 24.5 0 Z" fill="#a45c40"/>
<text x="335" y="282" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#2d2d2d">Their welfare</text>
<circle cx="465" cy="232" r="31" fill="#ffffff" stroke="#a45c40" stroke-width="1.5"/>
<ellipse cx="465.0" cy="238.8" rx="13.6" ry="4.4" fill="#a45c40" opacity="0.60"/><ellipse cx="465.0" cy="231.4" rx="13.6" ry="4.4" fill="#a45c40" opacity="0.80"/><ellipse cx="465.0" cy="223.9" rx="13.6" ry="4.4" fill="#a45c40" opacity="1.00"/>
<text x="465" y="282" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#2d2d2d">Their property</text>
<circle cx="335" cy="328" r="31" fill="#ffffff" stroke="#a45c40" stroke-width="1.5"/>
<path d="M 335.0 314.4 C 324.8 309.0 317.3 312.4 317.3 314.4 L 317.3 337.6 C 317.3 335.5 324.8 332.8 335.0 337.6 C 345.2 332.8 352.7 335.5 352.7 337.6 L 352.7 314.4 C 352.7 312.4 345.2 309.0 335.0 314.4 Z" fill="#a45c40"/><line x1="335.0" y1="314.4" x2="335.0" y2="337.6" stroke="#ffffff" stroke-width="1.2"/>
<text x="335" y="378" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#2d2d2d">Their lineage</text>
<text x="400" y="480" text-anchor="middle" font-size="13.0" font-weight="bold" fill="#2d2d2d">The guardian is custodian, never owner, of the child&#x27;s due</text>
<line x1="90" y1="516" x2="710" y2="516" stroke="#c9c2b4" stroke-width="1"/>
<text x="400" y="540" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">A child taken into guardianship, whether by adoption or informal fostering, is held in</text>
<text x="400" y="559" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">amanah: their wellbeing, property, and true lineage must be safeguarded, not absorbed.</text>
<text x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#a45c40">Q4:58 — render trusts to whom they are due</text>
