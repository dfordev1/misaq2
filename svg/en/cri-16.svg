<rect x="579" y="200" width="140" height="150" rx="12" fill="#a45c40" opacity="1.00"/>
<path d="M 618.0 258.7 L 642.8 240.1 L 655.2 240.1 L 680.0 258.7 L 670.1 268.6 L 649.0 253.7 L 627.9 268.6 Z" fill="#faf8f3"/>
<text x="649" y="302" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#faf8f3">Heirs carry it</text>
<text x="649" y="317" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#faf8f3">out</text>
<text x="400" y="392" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#777777">Distorting a bequest after witnessing is a sin</text>
<line x1="90" y1="516" x2="710" y2="516" stroke="#c9c2b4" stroke-width="1"/>
<text x="400" y="540" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">Instructions given on a deathbed carry the full weight of a covenant witnessed at its</text>
<text x="400" y="559" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">most solemn hour — the living are bound to carry them out.</text>
<text x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#a45c40">Q2:180-182 — the bequest, witnessed and honoured</text>
