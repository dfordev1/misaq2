<rect x="247" y="200" width="140" height="150" rx="12" fill="#a45c40" opacity="0.70"/>
<circle cx="317.0" cy="231.4" r="12.4" fill="#faf8f3"/><path d="M 294.7 282.2 a 22.3 28.5 0 0 1 44.6 0 Z" fill="#faf8f3"/>
<text x="317" y="302" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#faf8f3">Witnesses present</text>
