<text x="483" y="302" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#faf8f3">Instructions</text>
<text x="483" y="317" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#faf8f3">recorded</text>
