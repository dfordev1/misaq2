<text x="400" y="46" text-anchor="middle" font-size="11.0" font-weight="normal" fill="#777777">WORK &amp; THE PROFESSIONS</text>
<text x="400" y="78" text-anchor="middle" font-size="24.0" font-weight="bold" fill="#2d2d2d">The Line the Translator Added</text>
