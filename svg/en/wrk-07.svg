<text x="215" y="336" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#2d2d2d">Words spoken</text>
<text x="215" y="352" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#777777">what was actually said</text>
