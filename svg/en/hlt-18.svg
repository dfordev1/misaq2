<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" width="800" height="620" font-family="Georgia, 'Noto Serif', serif">
<defs><marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2d2d2d"/></marker></defs>
<rect x="0" y="0" width="800" height="620" fill="#faf8f3"/>
<rect x="0" y="0" width="800" height="7" fill="#a45c40"/>
<text x="400" y="46" text-anchor="middle" font-size="11.0" font-weight="normal" fill="#777777">HEALTH, BODY &amp; MEDICINE</text>
<text x="400" y="78" text-anchor="middle" font-size="24.0" font-weight="bold" fill="#2d2d2d">Who Decides for Her Now</text>
<rect x="180" y="178" width="440" height="62" rx="10" fill="#a45c40" opacity="0.30"/>
<text x="400" y="208" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#2d2d2d">Decisions made on her behalf</text>
<text x="400" y="227" text-anchor="middle" font-size="11.0" font-weight="normal" fill="#2d2d2d">narrowest layer — only where she cannot choose</text>
<rect x="158" y="252" width="485" height="62" rx="10" fill="#a45c40" opacity="0.48"/>
<text x="400" y="282" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#2d2d2d">Consultation of her wishes</text>
<text x="400" y="301" text-anchor="middle" font-size="11.0" font-weight="normal" fill="#2d2d2d">sought wherever any capacity remains</text>
<rect x="135" y="326" width="530" height="62" rx="10" fill="#a45c40" opacity="0.66"/>
<text x="400" y="356" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#2d2d2d">Her personhood, never property</text>
<text x="400" y="375" text-anchor="middle" font-size="11.0" font-weight="normal" fill="#2d2d2d">the ground every other layer stands on</text>
<text x="400" y="162" text-anchor="middle" font-size="12.0" font-weight="normal" fill="#777777">read from the bottom up</text>
<line x1="90" y1="516" x2="710" y2="516" stroke="#c9c2b4" stroke-width="1"/>
<text x="400" y="540" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">Guardianship over an incapacitated relative is a stacked duty — capacity to act rests on</text>
<text x="400" y="559" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">care, and care rests on never treating them as property.</text>
<text x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#a45c40">Q4:5</text>
</svg>
