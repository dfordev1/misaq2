<text x="400" y="46" text-anchor="middle" font-size="11.0" font-weight="normal" fill="#777777">CRISIS, DURESS &amp; HARD CASES</text>
<text x="400" y="78" text-anchor="middle" font-size="24.0" font-weight="bold" fill="#2d2d2d">The Earthquake Fund That Sat Unspent</text>
<path d="M 250 150 L 550 150 L 550 300 C 550 372 486 420 400 440 C 314 420 250 372 250 300 Z" fill="#a45c40" opacity="0.10" stroke="#a45c40" stroke-width="2.5"/>
<text x="400" y="176" text-anchor="middle" font-size="13.0" font-weight="bold" fill="#a45c40">relief funds, held in amanah</text>
<circle cx="335" cy="232" r="31" fill="#ffffff" stroke="#a45c40" stroke-width="1.5"/>
<ellipse cx="335.0" cy="238.8" rx="13.6" ry="4.4" fill="#a45c40" opacity="0.60"/><ellipse cx="335.0" cy="231.4" rx="13.6" ry="4.4" fill="#a45c40" opacity="0.80"/><ellipse cx="335.0" cy="223.9" rx="13.6" ry="4.4" fill="#a45c40" opacity="1.00"/>
<text x="335" y="282" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#2d2d2d">Donations</text>
<circle cx="465" cy="232" r="31" fill="#ffffff" stroke="#a45c40" stroke-width="1.5"/>
<rect x="454.1" y="215.0" width="21.8" height="29.9" rx="1.7" fill="#a45c40"/><rect x="458.2" y="220.5" width="13.6" height="1.7" fill="#ffffff" opacity="0.85"/><rect x="458.2" y="226.3" width="13.6" height="1.7" fill="#ffffff" opacity="0.85"/><rect x="458.2" y="232.0" width="13.6" height="1.7" fill="#ffffff" opacity="0.85"/><rect x="458.2" y="237.8" width="13.6" height="1.7" fill="#ffffff" opacity="0.85"/>
<text x="465" y="282" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#2d2d2d">Pledge terms</text>
<circle cx="335" cy="328" r="31" fill="#ffffff" stroke="#a45c40" stroke-width="1.5"/>
<circle cx="335.0" cy="315.8" r="6.8" fill="#a45c40"/><path d="M 322.8 343.7 a 12.2 15.6 0 0 1 24.5 0 Z" fill="#a45c40"/>
<text x="335" y="378" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#2d2d2d">Named victims</text>
<text x="400" y="480" text-anchor="middle" font-size="13.0" font-weight="bold" fill="#2d2d2d">The fund is custodian, never owner, of what was pledged</text>
<line x1="90" y1="516" x2="710" y2="516" stroke="#c9c2b4" stroke-width="1"/>
<text x="400" y="540" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">Money pledged for disaster relief is amanah the instant it is collected — held for the</text>
<text x="400" y="559" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">victims, not the collector&#x27;s convenience.</text>
<text x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#a45c40">Q4:58</text>
