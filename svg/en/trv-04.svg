<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" width="800" height="620" font-family="Georgia, 'Noto Serif', serif">
<defs><marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2d2d2d"/></marker></defs>
<rect x="0" y="0" width="800" height="620" fill="#faf8f3"/>
<rect x="0" y="0" width="800" height="7" fill="#a45c40"/>
<text x="400" y="46" text-anchor="middle" font-size="11.0" font-weight="normal" fill="#777777">TRAVEL, MIGRATION &amp; HOSPITALITY</text>
<text x="400" y="78" text-anchor="middle" font-size="24.0" font-weight="bold" fill="#2d2d2d">Three Days of Hospitality, No Questions</text>
<text x="400" y="106" text-anchor="middle" font-size="24.0" font-weight="bold" fill="#2d2d2d">Asked</text>
<rect x="81" y="200" width="140" height="150" rx="12" fill="#a45c40" opacity="0.55"/>
<circle cx="151.0" cy="231.4" r="12.4" fill="#faf8f3"/><path d="M 128.7 282.2 a 22.3 28.5 0 0 1 44.6 0 Z" fill="#faf8f3"/>
<text x="151" y="302" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#faf8f3">Guest arrives</text>
<line x1="225" y1="275" x2="241" y2="275" stroke="#2d2d2d" stroke-width="2" marker-end="url(#ar)"/>
<rect x="247" y="200" width="140" height="150" rx="12" fill="#a45c40" opacity="0.70"/>
<path d="M 286.0 250.0 L 317.0 222.1 L 348.0 250.0 Z" fill="#faf8f3"/><rect x="294.7" y="250.0" width="44.6" height="28.5" fill="#faf8f3" opacity="0.85"/>
<text x="317" y="302" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#faf8f3">Sheltered</text>
<line x1="391" y1="275" x2="407" y2="275" stroke="#2d2d2d" stroke-width="2" marker-end="url(#ar)"/>
<rect x="413" y="200" width="140" height="150" rx="12" fill="#a45c40" opacity="0.85"/>
<path d="M 483.0 274.8 C 444.6 251.2 460.7 222.7 483.0 241.3 C 505.3 222.7 521.4 251.2 483.0 274.8 Z" fill="#faf8f3"/>
<text x="483" y="302" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#faf8f3">Honored fully</text>
<line x1="557" y1="275" x2="573" y2="275" stroke="#2d2d2d" stroke-width="2" marker-end="url(#ar)"/>
<rect x="579" y="200" width="140" height="150" rx="12" fill="#a45c40" opacity="1.00"/>
<circle cx="649.0" cy="250.0" r="27.3" fill="none" stroke="#faf8f3" stroke-width="5.6"/><line x1="649.0" y1="250.0" x2="649.0" y2="233.9" stroke="#faf8f3" stroke-width="4.3"/><line x1="649.0" y1="250.0" x2="661.4" y2="256.2" stroke="#faf8f3" stroke-width="4.3"/>
<text x="649" y="302" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#faf8f3">Three days</text>
<text x="400" y="392" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#777777">beyond that, kindness continues as charity</text>
<line x1="90" y1="516" x2="710" y2="516" stroke="#c9c2b4" stroke-width="1"/>
<text x="400" y="540" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">A believer who takes in a guest owes generous hospitality for three days before any</text>
<text x="400" y="559" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">obligation ends or debt is even discussed.</text>
<text x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#a45c40">Bukhari — whoever believes in Allah and the Last Day let him honor his guest</text>
</svg>
