<text x="400" y="392" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#777777">the heat of the moment does not undo the oath</text>
<line x1="90" y1="516" x2="710" y2="516" stroke="#c9c2b4" stroke-width="1"/>
<text x="400" y="540" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">A vow made in the heat of anger still carries real consequence, which is why the</text>
<text x="400" y="559" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">tradition gives room for expiation rather than treating fury as license.</text>
<text x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#a45c40">Q5:89</text>
