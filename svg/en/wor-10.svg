<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" width="800" height="620" font-family="Georgia, 'Noto Serif', serif">
<defs><marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2d2d2d"/></marker></defs>
<rect x="0" y="0" width="800" height="620" fill="#faf8f3"/>
<rect x="0" y="0" width="800" height="7" fill="#a45c40"/>
<text x="400" y="46" text-anchor="middle" font-size="11.0" font-weight="normal" fill="#777777">WORSHIP &amp; DISCIPLINE</text>
<text x="400" y="78" text-anchor="middle" font-size="24.0" font-weight="bold" fill="#2d2d2d">Why the Same Act Needs a Different Niyyah</text>
<line x1="400" y1="170" x2="400" y2="380" stroke="#a45c40" stroke-width="7"/>
<rect x="330" y="380" width="140" height="14" rx="4" fill="#a45c40"/>
<line x1="200" y1="200" x2="600" y2="200" stroke="#a45c40" stroke-width="6"/>
<circle cx="400" cy="200" r="13" fill="#2d2d2d"/>
<line x1="215" y1="200" x2="215" y2="252" stroke="#a45c40" stroke-width="2"/>
<path d="M 143 252 L 287 252 L 261 306 L 169 306 Z" fill="#ffffff" stroke="#a45c40" stroke-width="2"/>
<rect x="202.7" y="257.8" width="24.6" height="40.5" rx="4.0" fill="#a45c40"/><rect x="206.2" y="263.0" width="17.6" height="25.5" fill="#faf8f3" opacity="0.9"/>
<text x="215" y="336" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#2d2d2d">The visible act</text>
<text x="215" y="352" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#777777">same for everyone</text>
<line x1="585" y1="200" x2="585" y2="252" stroke="#a45c40" stroke-width="2"/>
<path d="M 513 252 L 657 252 L 631 306 L 539 306 Z" fill="#ffffff" stroke="#a45c40" stroke-width="2"/>
<path d="M 585.0 295.6 C 557.7 278.9 569.2 258.6 585.0 271.8 C 600.8 258.6 612.3 278.9 585.0 295.6 Z" fill="#a45c40"/>
<text x="585" y="336" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#2d2d2d">The niyyah behind it</text>
<text x="585" y="352" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#777777">what the pact is judged on</text>
<text x="400" y="424" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#777777">form without intention does not fulfil the covenant</text>
<line x1="90" y1="516" x2="710" y2="516" stroke="#c9c2b4" stroke-width="1"/>
<text x="400" y="540" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">Two people can pray the identical motions; the covenant is judged by what was intended,</text>
<text x="400" y="559" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">not by the motion alone.</text>
<text x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#a45c40">Bukhari, Kitab Bad&#x27; al-Wahy — actions are by intentions</text>
</svg>
