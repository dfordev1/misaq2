<text x="400" y="540" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">Property found abroad must be announced and safeguarded for its owner, not kept simply</text>
<text x="400" y="559" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">because the owner is far away and untraceable.</text>
<text x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#a45c40">Hadith — Zayd ibn Khalid, on announcing luqata for a year</text>
