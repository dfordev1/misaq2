<text x="400" y="46" text-anchor="middle" font-size="11.0" font-weight="normal" fill="#777777">CRISIS, DURESS &amp; HARD CASES</text>
<text x="400" y="78" text-anchor="middle" font-size="24.0" font-weight="bold" fill="#2d2d2d">Two Elderly Parents, One Seat on the Last</text>
<text x="400" y="106" text-anchor="middle" font-size="24.0" font-weight="bold" fill="#2d2d2d">Bus</text>
<line x1="400" y1="170" x2="400" y2="380" stroke="#a45c40" stroke-width="7"/>
<rect x="330" y="380" width="140" height="14" rx="4" fill="#a45c40"/>
<line x1="200" y1="200" x2="600" y2="200" stroke="#a45c40" stroke-width="6"/>
<circle cx="400" cy="200" r="13" fill="#2d2d2d"/>
<line x1="215" y1="200" x2="215" y2="252" stroke="#a45c40" stroke-width="2"/>
<path d="M 143 252 L 287 252 L 261 306 L 169 306 Z" fill="#ffffff" stroke="#a45c40" stroke-width="2"/>
<circle cx="215.0" cy="264.8" r="8.8" fill="#a45c40"/><path d="M 199.2 300.9 a 15.8 20.2 0 0 1 31.7 0 Z" fill="#a45c40"/>
<text x="215" y="336" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#2d2d2d">Duty to parent A</text>
<text x="215" y="352" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#777777">cannot walk</text>
<line x1="585" y1="200" x2="585" y2="252" stroke="#a45c40" stroke-width="2"/>
<path d="M 513 252 L 657 252 L 631 306 L 539 306 Z" fill="#ffffff" stroke="#a45c40" stroke-width="2"/>
<circle cx="585.0" cy="264.8" r="8.8" fill="#a45c40"/><path d="M 569.2 300.9 a 15.8 20.2 0 0 1 31.7 0 Z" fill="#a45c40"/>
<text x="585" y="336" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#2d2d2d">Duty to parent B</text>
<text x="585" y="352" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#777777">medically fragile</text>
<text x="400" y="424" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#777777">Triage by capacity, not by favoritism</text>
<line x1="90" y1="516" x2="710" y2="516" stroke="#c9c2b4" stroke-width="1"/>
<text x="400" y="540" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">When two real duties collide and only one can be met, weigh capacity and nearest need —</text>
<text x="400" y="559" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">no burden is asked beyond what a soul can bear.</text>
<text x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#a45c40">Q2:286</text>
</svg>
