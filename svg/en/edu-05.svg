<text x="575" y="336" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">Answered plainly when asked</text>
<text x="575" y="361" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#777777">knowledge set free</text>
<line x1="400" y1="140" x2="400" y2="436" stroke="#c9c2b4" stroke-dasharray="5 5"/>
<line x1="90" y1="516" x2="710" y2="516" stroke="#c9c2b4" stroke-width="1"/>
<text x="400" y="540" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">Refusing to answer a sincere question you can answer, out of rivalry or spite, is</text>
<text x="400" y="559" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">concealment of what should have been given freely.</text>
<text x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#a45c40">Q2:159 — those who conceal what We sent down</text>
