<text x="400" y="46" text-anchor="middle" font-size="11.0" font-weight="normal" fill="#777777">WORSHIP &amp; DISCIPLINE</text>
<text x="400" y="78" text-anchor="middle" font-size="24.0" font-weight="bold" fill="#2d2d2d">The Fast No One Can Check</text>
<path d="M 250 150 L 550 150 L 550 300 C 550 372 486 420 400 440 C 314 420 250 372 250 300 Z" fill="#0f5257" opacity="0.10" stroke="#0f5257" stroke-width="2.5"/>
<text x="400" y="176" text-anchor="middle" font-size="13.0" font-weight="bold" fill="#0f5257">held in amānah</text>
<circle cx="335" cy="232" r="31" fill="#ffffff" stroke="#0f5257" stroke-width="1.5"/>
<path d="M 335.0 214.4 C 346.6 228.6 347.2 245.0 335.0 245.0 C 322.8 245.0 323.4 228.6 335.0 214.4 Z" fill="#0f5257"/>
<text x="335" y="282" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#2d2d2d">Water untouched</text>
<circle cx="465" cy="232" r="31" fill="#ffffff" stroke="#0f5257" stroke-width="1.5"/>
<circle cx="465.0" cy="230.0" r="15.0" fill="none" stroke="#0f5257" stroke-width="3.1"/><line x1="465.0" y1="230.0" x2="465.0" y2="221.2" stroke="#0f5257" stroke-width="2.4"/><line x1="465.0" y1="230.0" x2="471.8" y2="233.4" stroke="#0f5257" stroke-width="2.4"/>
<text x="465" y="282" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#2d2d2d">Hours honored</text>
<circle cx="335" cy="328" r="31" fill="#ffffff" stroke="#0f5257" stroke-width="1.5"/>
<path d="M 335.0 339.6 C 313.9 326.7 322.8 311.0 335.0 321.2 C 347.2 311.0 356.1 326.7 335.0 339.6 Z" fill="#0f5257"/>
<text x="335" y="378" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#2d2d2d">Intention</text>
<text x="335" y="391" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#2d2d2d">private</text>
<text x="400" y="480" text-anchor="middle" font-size="13.0" font-weight="bold" fill="#2d2d2d">No witness but the One the pact was made with</text>
<line x1="90" y1="516" x2="710" y2="516" stroke="#c9c2b4" stroke-width="1"/>
<text x="400" y="540" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">You could eat in a locked room and no one would know. Fasting works only because the</text>
<text x="400" y="559" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">covenant is kept even when unaudited.</text>
<text x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#0f5257">Bukhari, Kitab al-Iman — the sign of the hypocrite</text>
</svg>
