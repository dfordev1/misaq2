<text x="649" y="302" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#faf8f3">Trust broken</text>
<text x="400" y="392" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#777777">a private word carries an unspoken amanah</text>
<line x1="90" y1="516" x2="710" y2="516" stroke="#c9c2b4" stroke-width="1"/>
<text x="400" y="540" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">A private chat, shared in confidence, is not yours alone to publish. Screenshotting it</text>
<text x="400" y="559" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">out of context and forwarding it is a small betrayal with a wide blast radius.</text>
<text x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#a45c40">Bukhari — hypocrite&#x27;s signs hadith</text>
