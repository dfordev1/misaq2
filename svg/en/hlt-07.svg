<text x="400" y="284" text-anchor="middle" font-size="14.0" font-weight="bold" fill="#faf8f3">Communal</text>
<text x="400" y="300" text-anchor="middle" font-size="14.0" font-weight="bold" fill="#faf8f3">immunity</text>
<line x1="90" y1="516" x2="710" y2="516" stroke="#c9c2b4" stroke-width="1"/>
<text x="400" y="540" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">Refusing a vaccine is not a private act when it reopens a plague for the whole quarter —</text>
<text x="400" y="559" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">the harm to the collective is real.</text>
<text x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#4a4a68">hadith — la darar wa la dirar (no harm, no reciprocating harm)</text>
