<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 640" width="900" height="640">
<rect width="900" height="640" fill="#f4f7f6"/>
<text x="450" y="42" text-anchor="middle" font-family="Georgia, serif" font-size="26" fill="#1a2332" font-weight="700">Six Covenantal Axes</text>
<text x="450" y="70" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#4a5560">Simplified map of Islamic Covenant Theology</text>
<circle cx="450" cy="340" r="58" fill="#0d6e6e"/>
<text x="450" y="335" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#fff" font-weight="700">Allah</text>
<text x="450" y="358" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#d7f0ef">Rabb</text>
<line x1="450" y1="282" x2="450" y2="160" stroke="#0d6e6e" stroke-width="3"/>
<line x1="500" y1="300" x2="680" y2="180" stroke="#0d6e6e" stroke-width="3"/>
<line x1="505" y1="375" x2="700" y2="480" stroke="#0d6e6e" stroke-width="3"/>
<line x1="450" y1="398" x2="450" y2="520" stroke="#0d6e6e" stroke-width="3"/>
<line x1="395" y1="375" x2="200" y2="480" stroke="#0d6e6e" stroke-width="3"/>
<line x1="400" y1="300" x2="220" y2="180" stroke="#0d6e6e" stroke-width="3"/>
<rect x="360" y="110" width="180" height="50" rx="10" fill="#fff" stroke="#0d6e6e" stroke-width="2"/>
<text x="450" y="132" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#1a2332" font-weight="700">1 - Humanity</text>
<text x="450" y="150" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#4a5560">Alast / fulfill / break</text>
<rect x="640" y="145" width="200" height="50" rx="10" fill="#fff" stroke="#b8860b" stroke-width="2"/>
<text x="740" y="167" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#1a2332" font-weight="700">2 - Prophets</text>
<text x="740" y="185" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#4a5560">Q 33:7 / Q 3:81</text>
<rect x="660" y="460" width="200" height="50" rx="10" fill="#fff" stroke="#0d6e6e" stroke-width="2"/>
<text x="760" y="482" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#1a2332" font-weight="700">3 - Scripture peoples</text>
<text x="760" y="500" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#4a5560">Bani Israil / People of Book</text>
<rect x="360" y="520" width="180" height="50" rx="10" fill="#fff" stroke="#8b3a3a" stroke-width="2"/>
<text x="450" y="542" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#1a2332" font-weight="700">6 - Eschatology</text>
<text x="450" y="560" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#4a5560">questioning / judgment</text>
<rect x="40" y="460" width="200" height="50" rx="10" fill="#fff" stroke="#2d6a4f" stroke-width="2"/>
<text x="140" y="482" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#1a2332" font-weight="700">5 - Interpersonal</text>
<text x="140" y="500" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#4a5560">contracts / oaths / marriage</text>
<rect x="40" y="145" width="200" height="50" rx="10" fill="#fff" stroke="#0d6e6e" stroke-width="2"/>
<text x="140" y="167" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#1a2332" font-weight="700">4 - Community</text>
<text x="140" y="185" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#4a5560">bayah / treaties</text>
