<text x="400" y="46" text-anchor="middle" font-size="11.0" font-weight="normal" fill="#777777">WORK &amp; THE PROFESSIONS</text>
<text x="400" y="78" text-anchor="middle" font-size="24.0" font-weight="bold" fill="#2d2d2d">The Deadline He Promised and Missed</text>
<line x1="400" y1="170" x2="400" y2="380" stroke="#a45c40" stroke-width="7"/>
<rect x="330" y="380" width="140" height="14" rx="4" fill="#a45c40"/>
<line x1="200" y1="200" x2="600" y2="200" stroke="#a45c40" stroke-width="6"/>
<circle cx="400" cy="200" r="13" fill="#2d2d2d"/>
<line x1="215" y1="200" x2="215" y2="252" stroke="#a45c40" stroke-width="2"/>
<path d="M 143 252 L 287 252 L 261 306 L 169 306 Z" fill="#ffffff" stroke="#a45c40" stroke-width="2"/>
<circle cx="215.0" cy="278.0" r="19.4" fill="none" stroke="#a45c40" stroke-width="4.0"/><line x1="215.0" y1="278.0" x2="215.0" y2="266.6" stroke="#a45c40" stroke-width="3.1"/><line x1="215.0" y1="278.0" x2="223.8" y2="282.4" stroke="#a45c40" stroke-width="3.1"/>
<text x="215" y="336" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#2d2d2d">Deadline promised</text>
<text x="215" y="352" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#777777">what was pledged</text>
<line x1="585" y1="200" x2="585" y2="252" stroke="#a45c40" stroke-width="2"/>
<path d="M 513 252 L 657 252 L 631 306 L 539 306 Z" fill="#ffffff" stroke="#a45c40" stroke-width="2"/>
<path d="M 563.0 284.2 L 580.6 271.0 L 589.4 271.0 L 607.0 284.2 L 600.0 291.2 L 585.0 280.6 L 570.0 291.2 Z" fill="#a45c40"/>
<text x="585" y="336" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#2d2d2d">Work delivered</text>
<text x="585" y="352" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#777777">what was owed</text>
<text x="400" y="424" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#777777">a promise of timing is still a promise</text>
<line x1="90" y1="516" x2="710" y2="516" stroke="#c9c2b4" stroke-width="1"/>
<text x="400" y="540" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">A deadline given is a promise made. Missing it without word is not lateness alone — it</text>
<text x="400" y="559" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">is a small breach of ʿahd, weighed all the same.</text>
<text x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#a45c40">Q17:34</text>
</svg>
