<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" width="800" height="620" font-family="Georgia, 'Noto Serif', serif">
<defs><marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2d2d2d"/></marker></defs>
<rect x="0" y="0" width="800" height="620" fill="#faf8f3"/>
<rect x="0" y="0" width="800" height="7" fill="#0f5257"/>
<text x="400" y="46" text-anchor="middle" font-size="11.0" font-weight="normal" fill="#777777">WORSHIP &amp; DISCIPLINE</text>
<text x="400" y="78" text-anchor="middle" font-size="24.0" font-weight="bold" fill="#2d2d2d">The Night Prayer No One Sees You Stand For</text>
<path d="M 250 150 L 550 150 L 550 300 C 550 372 486 420 400 440 C 314 420 250 372 250 300 Z" fill="#0f5257" opacity="0.10" stroke="#0f5257" stroke-width="2.5"/>
<text x="400" y="176" text-anchor="middle" font-size="13.0" font-weight="bold" fill="#0f5257">kept behind a closed door</text>
<circle cx="335" cy="232" r="31" fill="#ffffff" stroke="#0f5257" stroke-width="1.5"/>
<circle cx="335.0" cy="230.0" r="15.0" fill="none" stroke="#0f5257" stroke-width="3.1"/><line x1="335.0" y1="230.0" x2="335.0" y2="221.2" stroke="#0f5257" stroke-width="2.4"/><line x1="335.0" y1="230.0" x2="341.8" y2="233.4" stroke="#0f5257" stroke-width="2.4"/>
<text x="335" y="282" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#2d2d2d">Late hour</text>
<circle cx="465" cy="232" r="31" fill="#ffffff" stroke="#0f5257" stroke-width="1.5"/>
<path d="M 465.0 243.6 C 443.9 230.7 452.8 215.0 465.0 225.2 C 477.2 215.0 486.1 230.7 465.0 243.6 Z" fill="#0f5257"/>
<text x="465" y="282" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#2d2d2d">No audience</text>
<circle cx="335" cy="328" r="31" fill="#ffffff" stroke="#0f5257" stroke-width="1.5"/>
<path d="M 318.0 330.8 L 331.6 320.6 L 338.4 320.6 L 352.0 330.8 L 346.6 336.2 L 335.0 328.0 L 323.4 336.2 Z" fill="#0f5257"/>
<text x="335" y="378" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#2d2d2d">Stood anyway</text>
<text x="400" y="480" text-anchor="middle" font-size="13.0" font-weight="bold" fill="#2d2d2d">Sincerity is measured where no one is counting</text>
<line x1="90" y1="516" x2="710" y2="516" stroke="#c9c2b4" stroke-width="1"/>
<text x="400" y="540" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">The covenant kept in private, with no one to witness it, is where its sincerity is</text>
<text x="400" y="559" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">proven — not the covenant performed for an audience.</text>
<text x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#0f5257">Bukhari, Kitab al-Iman — the sign of the hypocrite includes acting for show</text>
</svg>
