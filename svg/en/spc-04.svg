<path d="M 143 252 L 287 252 L 261 306 L 169 306 Z" fill="#ffffff" stroke="#a45c40" stroke-width="2"/>
<path d="M 215.0 295.6 C 187.7 278.9 199.2 258.6 215.0 271.8 C 230.8 258.6 242.3 278.9 215.0 295.6 Z" fill="#a45c40"/>
<text x="215" y="336" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#2d2d2d">Loyalty to kin</text>
<text x="215" y="352" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#777777">what feels loyal</text>
<line x1="585" y1="200" x2="585" y2="252" stroke="#a45c40" stroke-width="2"/>
