<text x="585" y="336" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#2d2d2d">Truthful testimony</text>
<text x="585" y="352" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#777777">what justice requires</text>
<text x="400" y="424" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#777777">be maintainers of justice, witnesses for Allah</text>
<line x1="90" y1="516" x2="710" y2="516" stroke="#c9c2b4" stroke-width="1"/>
<text x="400" y="540" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">Stand firm in testimony for Allah, even against yourself, parents, or relatives. Kinship</text>
<text x="400" y="559" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">must not bend the account of what happened.</text>
<text x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#a45c40">Q4:135</text>
