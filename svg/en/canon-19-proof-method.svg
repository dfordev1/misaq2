<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
<rect width="900" height="500" fill="#f4f7f6"/>
<text x="450" y="40" text-anchor="middle" font-family="Georgia, serif" font-size="24" fill="#1a2332" font-weight="700">How to Prove a Covenant Claim</text>
<text x="450" y="68" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#4a5560">Eight-step istidlal (simplified)</text>
<rect x="80" y="95" width="740" height="36" rx="6" fill="#0d6e6e"/>
<text x="450" y="118" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#fff" font-weight="700">1. Establish Arabic wording and addressees</text>
<rect x="80" y="137" width="740" height="36" rx="6" fill="#147a7a"/>
<text x="450" y="160" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#fff" font-weight="700">2. Name the covenantal act (take/fulfill/break/pledge)</text>
<rect x="80" y="179" width="740" height="36" rx="6" fill="#1a8a8a"/>
<text x="450" y="202" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#fff" font-weight="700">3. Extract stipulated content</text>
<rect x="80" y="221" width="740" height="36" rx="6" fill="#b8860b"/>
<text x="450" y="244" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#fff" font-weight="700">4. Identify consequence language</text>
<rect x="80" y="263" width="740" height="36" rx="6" fill="#9a7a20"/>
<text x="450" y="286" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#fff" font-weight="700">5. Assign axis (1-6)</text>
<rect x="80" y="305" width="740" height="36" rx="6" fill="#2d6a4f"/>
<text x="450" y="328" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#fff" font-weight="700">6. Add supporting ayat / sahih themes</text>
<rect x="80" y="347" width="740" height="36" rx="6" fill="#5a6a75"/>
<text x="450" y="370" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#fff" font-weight="700">7. Check classical tafsir range / ikhtilaf</text>
<rect x="80" y="389" width="740" height="36" rx="6" fill="#1a2332"/>
<text x="450" y="412" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#fff" font-weight="700">8. State yield and mark disputes</text>
</svg>
