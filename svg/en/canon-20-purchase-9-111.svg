<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" width="900" height="480">
<rect width="900" height="480" fill="#f4f7f6"/>
<text x="450" y="40" text-anchor="middle" font-family="Georgia, serif" font-size="26" fill="#1a2332" font-weight="700">The Purchase - Q 9:111</text>
<text x="450" y="68" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#4a5560">Eschatological bargain - simplified</text>
<rect x="80" y="120" width="220" height="120" rx="12" fill="#0d6e6e"/>
<text x="190" y="165" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#fff" font-weight="700">Believers</text>
<text x="190" y="195" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#d7f0ef">lives + wealth</text>
<polygon points="320,180 360,180 360,170 400,190 360,210 360,200 320,200" fill="#b8860b"/>
<rect x="420" y="120" width="200" height="120" rx="12" fill="#b8860b"/>
<text x="520" y="165" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#fff" font-weight="700">Allah buys</text>
<text x="520" y="195" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#fff8e7">ishtara</text>
<polygon points="640,180 680,180 680,170 720,190 680,210 680,200 640,200" fill="#2d6a4f"/>
<rect x="740" y="120" width="120" height="120" rx="12" fill="#2d6a4f"/>
<text x="800" y="165" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#fff" font-weight="700">Jannah</text>
<text x="800" y="195" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#d8f3e3">Paradise</text>
<rect x="120" y="290" width="660" height="120" rx="12" fill="#fff" stroke="#1a2332" stroke-width="2"/>
<text x="450" y="330" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#1a2332" font-weight="700">Who is more faithful to His ahd than Allah?</text>
<text x="450" y="360" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#4a5560">Rejoice in your bargain</text>
<text x="450" y="385" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#8b3a3a">Not a Christian 'covenant of grace' machine</text>
</svg>
