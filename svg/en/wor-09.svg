<text x="400" y="392" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#777777">feed, clothe, free, or fast — the legislated remedy</text>
<line x1="90" y1="516" x2="710" y2="516" stroke="#c9c2b4" stroke-width="1"/>
<text x="400" y="540" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">A deliberate oath that turns out wrong is not simply forgotten — the Qur&#x27;an gives a</text>
<text x="400" y="559" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">fixed path of expiation to release it.</text>
<text x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#a45c40">Q5:89 — kaffarah for deliberately contracted oaths</text>
