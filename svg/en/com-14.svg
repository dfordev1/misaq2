<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" width="800" height="620" font-family="Georgia, 'Noto Serif', serif">
<defs><marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2d2d2d"/></marker></defs>
<rect x="0" y="0" width="800" height="620" fill="#faf8f3"/>
<rect x="0" y="0" width="800" height="7" fill="#a45c40"/>
<text x="400" y="46" text-anchor="middle" font-size="11.0" font-weight="normal" fill="#777777">COMMUNITY &amp; ENVIRONMENT</text>
<text x="400" y="78" text-anchor="middle" font-size="24.0" font-weight="bold" fill="#2d2d2d">When the Street Learns of a Death</text>
<rect x="188" y="161" width="200" height="128" rx="12" fill="#ffffff" stroke="#a45c40" stroke-width="1.8"/>
<circle cx="288.0" cy="189.2" r="9.2" fill="#a45c40"/><path d="M 271.4 226.9 a 16.6 21.2 0 0 1 33.1 0 Z" fill="#a45c40"/>
<text x="288" y="249" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#2d2d2d">Attend the funeral</text>
<rect x="412" y="161" width="200" height="128" rx="12" fill="#ffffff" stroke="#a45c40" stroke-width="1.8"/>
<path d="M 512.0 221.4 C 483.5 203.9 495.4 182.8 512.0 196.6 C 528.6 182.8 540.5 203.9 512.0 221.4 Z" fill="#a45c40"/>
<text x="512" y="249" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#2d2d2d">Comfort the family</text>
<rect x="188" y="311" width="200" height="128" rx="12" fill="#ffffff" stroke="#a45c40" stroke-width="1.8"/>
<rect x="275.1" y="331.8" width="25.8" height="42.3" rx="4.1" fill="#a45c40"/><rect x="278.8" y="337.4" width="18.4" height="26.7" fill="#ffffff" opacity="0.9"/>
<text x="288" y="399" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#2d2d2d">Bring cooked food</text>
<rect x="412" y="311" width="200" height="128" rx="12" fill="#ffffff" stroke="#a45c40" stroke-width="1.8"/>
<circle cx="512.0" cy="353.0" r="20.2" fill="none" stroke="#a45c40" stroke-width="4.1"/><line x1="512.0" y1="353.0" x2="512.0" y2="341.0" stroke="#a45c40" stroke-width="3.2"/><line x1="512.0" y1="353.0" x2="521.2" y2="357.6" stroke="#a45c40" stroke-width="3.2"/>
<text x="512" y="399" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#2d2d2d">Stay through the days</text>
<text x="512" y="413" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#2d2d2d">after</text>
<line x1="90" y1="516" x2="710" y2="516" stroke="#c9c2b4" stroke-width="1"/>
<text x="400" y="540" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">Attending a neighbour&#x27;s funeral, comforting the bereaved, and sharing food afterward are</text>
<text x="400" y="559" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">treated as communal duties owed, not optional gestures.</text>
<text x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#a45c40">Bukhari — Kitab al-Adab, rights of the neighbour</text>
</svg>
