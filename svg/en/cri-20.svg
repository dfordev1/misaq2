<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" width="800" height="620" font-family="Georgia, 'Noto Serif', serif">
<defs><marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2d2d2d"/></marker></defs>
<rect x="0" y="0" width="800" height="620" fill="#faf8f3"/>
<rect x="0" y="0" width="800" height="7" fill="#2e6f40"/>
<text x="400" y="46" text-anchor="middle" font-size="11.0" font-weight="normal" fill="#777777">CRISIS, DURESS &amp; HARD CASES</text>
<text x="400" y="78" text-anchor="middle" font-size="24.0" font-weight="bold" fill="#2d2d2d">Staying Patient With a Partner Who Never</text>
<text x="400" y="106" text-anchor="middle" font-size="24.0" font-weight="bold" fill="#2d2d2d">Repairs</text>
<circle cx="130.0" cy="237.4" r="18.4" fill="#2e6f40"/><path d="M 96.9 312.8 a 33.1 42.3 0 0 1 66.2 0 Z" fill="#2e6f40"/>
<text x="130" y="332" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#2d2d2d">Partner who never</text>
<text x="130" y="347" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#2d2d2d">repairs</text>
<line x1="180" y1="265" x2="298" y2="265" stroke="#2d2d2d" stroke-width="2" marker-end="url(#ar)"/>
<path d="M 400 179 L 486 265 L 400 351 L 314 265 Z" fill="#ffffff" stroke="#2e6f40" stroke-width="2.5"/>
<text x="400" y="254" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#2e6f40">Does patience</text>
<text x="400" y="269" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#2e6f40">mean you excuse</text>
<text x="400" y="284" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#2e6f40">the debt?</text>
<line x1="492" y1="236" x2="596" y2="210" stroke="#2e6f40" stroke-width="2" marker-end="url(#ar)"/>
<rect x="600" y="180" width="150" height="62" rx="10" fill="#2e6f40" opacity="0.9"/>
<text x="675" y="204" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#faf8f3">No — the account is</text>
<text x="675" y="218" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#faf8f3">deferred, not erased</text>
<text x="675" y="172" text-anchor="middle" font-size="10.5" font-weight="normal" fill="#777777">yes</text>
<line x1="492" y1="296" x2="596" y2="352" stroke="#a33b2a" stroke-width="2" marker-end="url(#ar)"/>
<rect x="600" y="322" width="150" height="62" rx="10" fill="#a33b2a" opacity="0.9"/>
<text x="675" y="346" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#faf8f3">You bear the wrong</text>
<text x="675" y="360" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#faf8f3">forever</text>
<text x="675" y="314" text-anchor="middle" font-size="10.5" font-weight="normal" fill="#777777">no</text>
<line x1="90" y1="516" x2="710" y2="516" stroke="#c9c2b4" stroke-width="1"/>
<text x="400" y="540" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">Patience with a covenant partner who never mends the breach is virtue, but it is not a</text>
<text x="400" y="559" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">verdict — the reckoning of what they owe is left to the Day.</text>
<text x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#2e6f40">Q17:34 — the covenant will be asked about</text>
</svg>
