<text x="335" y="378" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#2d2d2d">Reading rooms</text>
<text x="400" y="480" text-anchor="middle" font-size="13.0" font-weight="bold" fill="#2d2d2d">The library is custodian, never any one reader&#x27;s property</text>
<line x1="90" y1="516" x2="710" y2="516" stroke="#c9c2b4" stroke-width="1"/>
<text x="400" y="540" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">A library&#x27;s books, journals, and reading rooms are held in common trust; hoarding,</text>
<text x="400" y="559" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">defacing, or failing to return them steals from every future reader.</text>
<text x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#4a4a68">Q4:58 — render trusts to their owners</text>
