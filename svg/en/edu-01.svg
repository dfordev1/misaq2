<text x="575" y="162" text-anchor="middle" font-size="15.0" font-weight="bold" fill="#2e6f40">✓  Cited</text>
<path d="M 575.0 218.0 C 545.0 202.0 523.0 212.0 523.0 218.0 L 523.0 286.0 C 523.0 280.0 545.0 272.0 575.0 286.0 C 605.0 272.0 627.0 280.0 627.0 286.0 L 627.0 218.0 C 627.0 212.0 605.0 202.0 575.0 218.0 Z" fill="#2e6f40"/><line x1="575.0" y1="218.0" x2="575.0" y2="286.0" stroke="#ffffff" stroke-width="3.5"/>
<text x="575" y="336" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">Credited every borrowed idea</text>
<text x="575" y="361" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#777777">the record stays honest</text>
<line x1="400" y1="140" x2="400" y2="436" stroke="#c9c2b4" stroke-dasharray="5 5"/>
<line x1="90" y1="516" x2="710" y2="516" stroke="#c9c2b4" stroke-width="1"/>
<text x="400" y="540" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">Copying a classmate&#x27;s paper and submitting it as your own breaks the trust of honest</text>
<text x="400" y="559" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">work; citing what you borrowed keeps the record true.</text>
<text x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#a45c40">Q2:42 — do not mix truth with falsehood</text>
