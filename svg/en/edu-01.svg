<text x="400" y="46" text-anchor="middle" font-size="11.0" font-weight="normal" fill="#777777">EDUCATION &amp; KNOWLEDGE</text>
<text x="400" y="78" text-anchor="middle" font-size="24.0" font-weight="bold" fill="#2d2d2d">The Notes You Passed Off as Yours</text>
<rect x="70" y="130" width="310" height="316" rx="14" fill="#ffffff" stroke="#a33b2a" stroke-width="2" opacity="0.95"/>
<text x="225" y="162" text-anchor="middle" font-size="15.0" font-weight="bold" fill="#a33b2a">✗  Plagiarised</text>
<rect x="193.0" y="208.0" width="64.0" height="88.0" rx="5.0" fill="#a33b2a"/><rect x="205.0" y="224.0" width="40.0" height="5.0" fill="#ffffff" opacity="0.85"/><rect x="205.0" y="241.0" width="40.0" height="5.0" fill="#ffffff" opacity="0.85"/><rect x="205.0" y="258.0" width="40.0" height="5.0" fill="#ffffff" opacity="0.85"/><rect x="205.0" y="275.0" width="40.0" height="5.0" fill="#ffffff" opacity="0.85"/>
<text x="225" y="336" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">Submitted another&#x27;s work as</text>
<text x="225" y="353" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">your own</text>
<text x="225" y="378" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#777777">truth mixed with falsehood</text>
