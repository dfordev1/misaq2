<text x="400" y="540" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">A retreat commitment is a covenant with a hard edge — a fixed span of time, deliberately</text>
<text x="400" y="559" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">walled off and kept for its purpose.</text>
<text x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#a45c40">Q2:187 — do not approach them while you are in retreat in the mosques</text>
