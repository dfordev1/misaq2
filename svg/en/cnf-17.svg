<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" width="800" height="620" font-family="Georgia, 'Noto Serif', serif">
<defs><marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2d2d2d"/></marker></defs>
<rect x="0" y="0" width="800" height="620" fill="#faf8f3"/>
<rect x="0" y="0" width="800" height="7" fill="#2e6f40"/>
<text x="400" y="46" text-anchor="middle" font-size="11.0" font-weight="normal" fill="#777777">CONFLICT &amp; RECONCILIATION</text>
<text x="400" y="78" text-anchor="middle" font-size="24.0" font-weight="bold" fill="#2d2d2d">Make It Right Before You Ask Forgiveness</text>
<rect x="81" y="200" width="140" height="150" rx="12" fill="#2e6f40" opacity="0.55"/>
<path d="M 120.0 258.7 L 144.8 240.1 L 157.2 240.1 L 182.0 258.7 L 172.1 268.6 L 151.0 253.7 L 129.9 268.6 Z" fill="#faf8f3"/>
<text x="151" y="302" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#faf8f3">Return the due</text>
<line x1="225" y1="275" x2="241" y2="275" stroke="#2d2d2d" stroke-width="2" marker-end="url(#ar)"/>
<rect x="247" y="200" width="140" height="150" rx="12" fill="#2e6f40" opacity="0.70"/>
<circle cx="317.0" cy="231.4" r="12.4" fill="#faf8f3"/><path d="M 294.7 282.2 a 22.3 28.5 0 0 1 44.6 0 Z" fill="#faf8f3"/>
<text x="317" y="302" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#faf8f3">Seek their pardon</text>
<line x1="391" y1="275" x2="407" y2="275" stroke="#2d2d2d" stroke-width="2" marker-end="url(#ar)"/>
<rect x="413" y="200" width="140" height="150" rx="12" fill="#2e6f40" opacity="0.85"/>
<path d="M 483.0 274.8 C 444.6 251.2 460.7 222.7 483.0 241.3 C 505.3 222.7 521.4 251.2 483.0 274.8 Z" fill="#faf8f3"/>
<text x="483" y="302" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#faf8f3">Then repent</text>
<line x1="557" y1="275" x2="573" y2="275" stroke="#2d2d2d" stroke-width="2" marker-end="url(#ar)"/>
<rect x="579" y="200" width="140" height="150" rx="12" fill="#2e6f40" opacity="1.00"/>
<polygon points="649.0,221.5 655.9,240.5 676.1,241.2 660.2,253.6 665.8,273.1 649.0,261.8 632.2,273.1 637.8,253.6 621.9,241.2 642.1,240.5" fill="#faf8f3"/>
<text x="649" y="302" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#faf8f3">Debt is closed</text>
<text x="400" y="392" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#777777">restitution precedes forgiveness, not the reverse</text>
<line x1="90" y1="516" x2="710" y2="516" stroke="#c9c2b4" stroke-width="1"/>
<text x="400" y="540" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">A wrong against a person is not wiped by regret alone — the tradition ties forgiveness</text>
<text x="400" y="559" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">to returning what was taken or seeking pardon from the one wronged, before the reckoning</text>
<text x="400" y="578" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">does it for you.</text>
<text x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#2e6f40">Bukhari — settle claims before the Day comes</text>
</svg>
