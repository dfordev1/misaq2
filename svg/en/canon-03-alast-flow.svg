<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" width="900" height="560">
<rect width="900" height="560" fill="#f4f7f6"/>
<text x="450" y="40" text-anchor="middle" font-family="Georgia, serif" font-size="26" fill="#1a2332" font-weight="700">Alast - Primordial Covenant</text>
<text x="450" y="68" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#4a5560">Q 7:172-173 - simplified flow</text>
<rect x="300" y="100" width="300" height="70" rx="10" fill="#0d6e6e"/>
<text x="450" y="130" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#fff" font-weight="700">Allah takes testimony</text>
<text x="450" y="152" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#d7f0ef">from Bani Adam progeny</text>
<polygon points="450,198 435,180 465,180" fill="#1a2332"/>
<rect x="250" y="210" width="400" height="70" rx="10" fill="#fff" stroke="#b8860b" stroke-width="3"/>
<text x="450" y="240" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="#1a2332" font-weight="700">Am I not your Lord?</text>
<text x="450" y="265" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#4a5560">a-lastu bi-rabbikum (Alast)</text>
<polygon points="450,308 435,290 465,290" fill="#1a2332"/>
<rect x="300" y="318" width="300" height="60" rx="10" fill="#2d6a4f"/>
<text x="450" y="343" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#fff" font-weight="700">They said: Bala - Yes</text>
<text x="450" y="363" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#d8f3e3">We testify</text>
<polygon points="450,406 435,388 465,388" fill="#1a2332"/>
<rect x="180" y="416" width="540" height="90" rx="10" fill="#fff" stroke="#8b3a3a" stroke-width="2"/>
<text x="450" y="448" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#1a2332" font-weight="700">Purpose: block excuses on Judgment Day</text>
<text x="450" y="472" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#4a5560">1) "We were unaware"  2) "Our fathers did shirk"</text>
<text x="450" y="492" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#8b3a3a">How (kayf) disputed | That it is hujjah: agreed</text>
</svg>
