<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" width="800" height="620" font-family="Georgia, 'Noto Serif', serif">
<defs><marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2d2d2d"/></marker></defs>
<rect x="0" y="0" width="800" height="620" fill="#faf8f3"/>
<rect x="0" y="0" width="800" height="7" fill="#a45c40"/>
<text x="400" y="46" text-anchor="middle" font-size="11.0" font-weight="normal" fill="#777777">EDUCATION &amp; KNOWLEDGE</text>
<text x="400" y="78" text-anchor="middle" font-size="24.0" font-weight="bold" fill="#2d2d2d">The Reviewer Who Read It Carefully</text>
<rect x="177.2" y="198.1" width="75.5" height="103.8" rx="5.9" fill="#a45c40"/><rect x="191.4" y="217.0" width="47.2" height="5.9" fill="#faf8f3" opacity="0.85"/><rect x="191.4" y="237.0" width="47.2" height="5.9" fill="#faf8f3" opacity="0.85"/><rect x="191.4" y="257.1" width="47.2" height="5.9" fill="#faf8f3" opacity="0.85"/><rect x="191.4" y="277.1" width="47.2" height="5.9" fill="#faf8f3" opacity="0.85"/>
<text x="215" y="348" text-anchor="middle" font-size="16.0" font-weight="bold" fill="#2d2d2d">Author</text>
<text x="215" y="372" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#777777">entrusts unpublished work</text>
<circle cx="585.0" cy="214.6" r="23.6" fill="#a45c40"/><path d="M 542.5 311.4 a 42.5 54.3 0 0 1 85.0 0 Z" fill="#a45c40"/>
<text x="585" y="348" text-anchor="middle" font-size="16.0" font-weight="bold" fill="#2d2d2d">Reviewer</text>
<text x="585" y="372" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#777777">owes honest, careful</text>
<text x="585" y="388" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#777777">reading</text>
<line x1="300" y1="250" x2="490" y2="250" stroke="#a45c40" stroke-width="3" marker-end="url(#ar)"/>
<line x1="500" y1="288" x2="310" y2="288" stroke="#a45c40" stroke-width="2" stroke-dasharray="6 4" opacity="0.7" marker-end="url(#ar)"/>
<text x="400" y="312" text-anchor="middle" font-size="11.0" font-weight="normal" fill="#777777">confidentiality and fairness both owed</text>
<text x="400" y="236" text-anchor="middle" font-size="13.0" font-weight="bold" fill="#a45c40">amanah — a trust to guard</text>
<line x1="90" y1="516" x2="710" y2="516" stroke="#c9c2b4" stroke-width="1"/>
<text x="400" y="540" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">A peer reviewer holds another scholar&#x27;s unpublished work as a trust; reading carelessly,</text>
<text x="400" y="559" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">stealing an idea, or rubber-stamping a friend all betray it.</text>
<text x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#a45c40">Q4:58 — render trusts to their owners</text>
</svg>
