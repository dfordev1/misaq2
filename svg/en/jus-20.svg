<text x="649" y="302" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#faf8f3">Debt still paid</text>
<text x="400" y="392" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#777777">accountability outlasts the individual</text>
<line x1="90" y1="516" x2="710" y2="516" stroke="#c9c2b4" stroke-width="1"/>
<text x="400" y="540" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">A covenant obligation does not dissolve with the person who made it — an estate, a</text>
<text x="400" y="559" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">successor, or an heir still carries what was owed.</text>
<text x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#2e6f40">Q17:34</text>
