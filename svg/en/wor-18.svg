<text x="400" y="312" text-anchor="middle" font-size="11.0" font-weight="normal" fill="#777777">obligation persists across settings</text>
<text x="400" y="219" text-anchor="middle" font-size="13.0" font-weight="bold" fill="#a45c40">the pact does not clock</text>
<text x="400" y="236" text-anchor="middle" font-size="13.0" font-weight="bold" fill="#a45c40">out</text>
<line x1="90" y1="516" x2="710" y2="516" stroke="#c9c2b4" stroke-width="1"/>
<text x="400" y="540" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">The workplace does not suspend the covenant. Prayer travels with the worker, even into a</text>
<text x="400" y="559" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">break room or stairwell.</text>
<text x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#a45c40">Q17:34 — the covenant will be asked about</text>
