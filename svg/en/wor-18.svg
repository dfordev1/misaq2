<text x="585" y="348" text-anchor="middle" font-size="16.0" font-weight="bold" fill="#2d2d2d">Worker</text>
<text x="585" y="372" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#777777">owes the prayer on time</text>
