<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" width="800" height="620" font-family="Georgia, 'Noto Serif', serif">
<defs><marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2d2d2d"/></marker></defs>
<rect x="0" y="0" width="800" height="620" fill="#faf8f3"/>
<rect x="0" y="0" width="800" height="7" fill="#2e6f40"/>
<text x="400" y="46" text-anchor="middle" font-size="11.0" font-weight="normal" fill="#777777">SPEECH, MEDIA &amp; TESTIMONY</text>
<text x="400" y="78" text-anchor="middle" font-size="24.0" font-weight="bold" fill="#2d2d2d">Fixing the Old Article Instead of Deleting</text>
<text x="400" y="106" text-anchor="middle" font-size="24.0" font-weight="bold" fill="#2d2d2d">It</text>
<rect x="177.2" y="198.1" width="75.5" height="103.8" rx="5.9" fill="#2e6f40"/><rect x="191.4" y="217.0" width="47.2" height="5.9" fill="#faf8f3" opacity="0.85"/><rect x="191.4" y="237.0" width="47.2" height="5.9" fill="#faf8f3" opacity="0.85"/><rect x="191.4" y="257.1" width="47.2" height="5.9" fill="#faf8f3" opacity="0.85"/><rect x="191.4" y="277.1" width="47.2" height="5.9" fill="#faf8f3" opacity="0.85"/>
<text x="215" y="348" text-anchor="middle" font-size="16.0" font-weight="bold" fill="#2d2d2d">Public record</text>
<text x="215" y="372" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#777777">owes accuracy</text>
<circle cx="585.0" cy="222.4" r="18.4" fill="#2e6f40"/><path d="M 551.9 297.9 a 33.1 42.3 0 0 1 66.3 0 Z" fill="#2e6f40"/><g opacity="0.55"><circle cx="523.6" cy="233.7" r="15.6" fill="#2e6f40"/><path d="M 495.6 297.6 a 28.0 35.8 0 0 1 56.1 0 Z" fill="#2e6f40"/></g><g opacity="0.55"><circle cx="646.4" cy="233.7" r="15.6" fill="#2e6f40"/><path d="M 618.3 297.6 a 28.0 35.8 0 0 1 56.1 0 Z" fill="#2e6f40"/></g>
<text x="585" y="348" text-anchor="middle" font-size="16.0" font-weight="bold" fill="#2d2d2d">Past readers</text>
<text x="585" y="372" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#777777">owed the correction</text>
<line x1="300" y1="250" x2="490" y2="250" stroke="#2e6f40" stroke-width="3" marker-end="url(#ar)"/>
<line x1="500" y1="288" x2="310" y2="288" stroke="#2e6f40" stroke-width="2" stroke-dasharray="6 4" opacity="0.7" marker-end="url(#ar)"/>
<text x="400" y="312" text-anchor="middle" font-size="11.0" font-weight="normal" fill="#777777">the record is a trust too</text>
<text x="400" y="219" text-anchor="middle" font-size="13.0" font-weight="bold" fill="#2e6f40">correct in place, don&#x27;t</text>
<text x="400" y="236" text-anchor="middle" font-size="13.0" font-weight="bold" fill="#2e6f40">erase</text>
<line x1="90" y1="516" x2="710" y2="516" stroke="#c9c2b4" stroke-width="1"/>
<text x="400" y="540" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">A public record found to be wrong should be corrected in place, not scrubbed and</text>
<text x="400" y="559" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">forgotten. Readers who trusted the first version are owed the update.</text>
<text x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#2e6f40">Q49:6</text>
</svg>
