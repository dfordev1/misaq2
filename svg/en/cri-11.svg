<text x="400" y="540" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">War does not dissolve the covenant owed to those outside it — the noncombatant, the</text>
<text x="400" y="559" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">crop, the well are protected even amid battle.</text>
<text x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#4a4a68">Bukhari, Kitab al-Jihad — prohibition on killing noncombatants</text>
