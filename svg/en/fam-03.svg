<path d="M 143 252 L 287 252 L 261 306 L 169 306 Z" fill="#ffffff" stroke="#a45c40" stroke-width="2"/>
<line x1="215.0" y1="258.6" x2="215.0" y2="295.6" stroke="#a45c40" stroke-width="2.6"/><line x1="195.6" y1="263.0" x2="234.4" y2="263.0" stroke="#a45c40" stroke-width="2.6"/><path d="M 187.7 273.6 L 203.6 273.6 L 195.6 284.2 Z" fill="#a45c40"/><path d="M 226.4 273.6 L 242.3 273.6 L 234.4 284.2 Z" fill="#a45c40"/><rect x="204.4" y="295.6" width="21.1" height="3.5" fill="#a45c40"/>
<text x="215" y="336" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#2d2d2d">Her rights</text>
<text x="215" y="352" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#777777">owed by custom, in fairness</text>
<line x1="585" y1="200" x2="585" y2="252" stroke="#a45c40" stroke-width="2"/>
<path d="M 513 252 L 657 252 L 631 306 L 539 306 Z" fill="#ffffff" stroke="#a45c40" stroke-width="2"/>
<line x1="585.0" y1="258.6" x2="585.0" y2="295.6" stroke="#a45c40" stroke-width="2.6"/><line x1="565.6" y1="263.0" x2="604.4" y2="263.0" stroke="#a45c40" stroke-width="2.6"/><path d="M 557.7 273.6 L 573.6 273.6 L 565.6 284.2 Z" fill="#a45c40"/><path d="M 596.4 273.6 L 612.3 273.6 L 604.4 284.2 Z" fill="#a45c40"/><rect x="574.4" y="295.6" width="21.1" height="3.5" fill="#a45c40"/>
<text x="585" y="336" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#2d2d2d">Her obligations</text>
<text x="585" y="352" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#777777">matched, not one-sided</text>
<text x="400" y="424" text-anchor="middle" font-size="12.5" font-weight="normal" fill="#777777">bi&#x27;l-ma&#x27;ruf — what is reasonable, not what is convenient</text>
<line x1="90" y1="516" x2="710" y2="516" stroke="#c9c2b4" stroke-width="1"/>
<text x="400" y="540" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">Wives have rights corresponding to their obligations, according to what is reasonable —</text>
<text x="400" y="559" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">a mutual standard, not a one-way demand.</text>
<text x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#a45c40">Q2:228</text>
