<text x="400" y="46" text-anchor="middle" font-size="11.0" font-weight="normal" fill="#777777">FAMILY &amp; PERSONAL LIFE</text>
<text x="400" y="78" text-anchor="middle" font-size="24.0" font-weight="bold" fill="#2d2d2d">Rights Matched to Obligations</text>
<line x1="400" y1="170" x2="400" y2="380" stroke="#a45c40" stroke-width="7"/>
<rect x="330" y="380" width="140" height="14" rx="4" fill="#a45c40"/>
