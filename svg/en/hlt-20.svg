<rect x="325.5" y="214.4" width="19.0" height="31.3" rx="3.1" fill="#a45c40"/><rect x="328.2" y="218.4" width="13.6" height="19.7" fill="#ffffff" opacity="0.9"/>
<text x="335" y="282" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#2d2d2d">Symptoms logged</text>
