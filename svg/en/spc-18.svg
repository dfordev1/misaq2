<text x="400" y="540" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">A signature is a form of testimony that you examined the terms. Signing blind does not</text>
<text x="400" y="559" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">void the covenant it seals, it just makes the ignorance yours.</text>
