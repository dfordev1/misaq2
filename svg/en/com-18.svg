<text x="400" y="46" text-anchor="middle" font-size="11.0" font-weight="normal" fill="#777777">COMMUNITY &amp; ENVIRONMENT</text>
<text x="400" y="78" text-anchor="middle" font-size="24.0" font-weight="bold" fill="#2d2d2d">The Bench Nobody Owns and Everybody Uses</text>
<rect x="188" y="161" width="200" height="128" rx="12" fill="#ffffff" stroke="#a45c40" stroke-width="1.8"/>
<circle cx="288.0" cy="203.0" r="20.2" fill="#a45c40"/><ellipse cx="288.0" cy="203.0" rx="8.3" ry="20.2" fill="none" stroke="#ffffff" stroke-width="1.6" opacity="0.85"/><line x1="267.8" y1="203.0" x2="308.2" y2="203.0" stroke="#ffffff" stroke-width="1.6" opacity="0.85"/>
<text x="288" y="249" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#2d2d2d">Shared, not private</text>
<rect x="412" y="161" width="200" height="128" rx="12" fill="#ffffff" stroke="#a45c40" stroke-width="1.8"/>
<path d="M 489.0 209.4 L 507.4 195.6 L 516.6 195.6 L 535.0 209.4 L 527.6 216.8 L 512.0 205.8 L 496.4 216.8 Z" fill="#a45c40"/>
<text x="512" y="249" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#2d2d2d">Leave it clean</text>
<rect x="188" y="311" width="200" height="128" rx="12" fill="#ffffff" stroke="#a45c40" stroke-width="1.8"/>
<circle cx="288.0" cy="342.2" r="7.2" fill="#a45c40"/><path d="M 275.1 371.7 a 12.9 16.5 0 0 1 25.8 0 Z" fill="#a45c40"/><g opacity="0.55"><circle cx="264.1" cy="346.7" r="6.1" fill="#a45c40"/><path d="M 253.2 371.5 a 10.9 14.0 0 0 1 21.9 0 Z" fill="#a45c40"/></g><g opacity="0.55"><circle cx="311.9" cy="346.7" r="6.1" fill="#a45c40"/><path d="M 301.0 371.5 a 10.9 14.0 0 0 1 21.9 0 Z" fill="#a45c40"/></g>
<text x="288" y="399" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#2d2d2d">Others waiting turn</text>
<rect x="412" y="311" width="200" height="128" rx="12" fill="#ffffff" stroke="#a45c40" stroke-width="1.8"/>
<path d="M 512.0 371.4 C 483.5 353.9 495.4 332.8 512.0 346.6 C 528.6 332.8 540.5 353.9 512.0 371.4 Z" fill="#a45c40"/>
<text x="512" y="399" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#2d2d2d">Care as if lent to you</text>
<line x1="90" y1="516" x2="710" y2="516" stroke="#c9c2b4" stroke-width="1"/>
<text x="400" y="540" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">A public bench, park path, or square belongs to no one and everyone at once — each user</text>
<text x="400" y="559" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">owes it the same care they owe a borrowed thing.</text>
<text x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#a45c40">Muslim — removing harm from the road is a branch of faith</text>
</svg>
