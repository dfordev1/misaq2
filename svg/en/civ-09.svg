<text x="400" y="254" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#a45c40">Did you speak</text>
<text x="400" y="269" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#a45c40">the truth</text>
<text x="400" y="284" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#a45c40">openly?</text>
<line x1="492" y1="236" x2="596" y2="210" stroke="#2e6f40" stroke-width="2" marker-end="url(#ar)"/>
<rect x="600" y="180" width="150" height="62" rx="10" fill="#2e6f40" opacity="0.9"/>
<text x="675" y="204" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#faf8f3">Public protected</text>
<text x="675" y="172" text-anchor="middle" font-size="10.5" font-weight="normal" fill="#777777">yes</text>
<line x1="492" y1="296" x2="596" y2="352" stroke="#a33b2a" stroke-width="2" marker-end="url(#ar)"/>
<rect x="600" y="322" width="150" height="62" rx="10" fill="#a33b2a" opacity="0.9"/>
<text x="675" y="346" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#faf8f3">Silence complicit</text>
<text x="675" y="314" text-anchor="middle" font-size="10.5" font-weight="normal" fill="#777777">no</text>
<line x1="90" y1="516" x2="710" y2="516" stroke="#c9c2b4" stroke-width="1"/>
<text x="400" y="540" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">Whistleblowing on danger hidden from the public is bearing witness to truth, even when</text>
<text x="400" y="559" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">silence would be safer and quieter.</text>
<text x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#a45c40">Q4:135</text>
