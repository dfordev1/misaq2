<rect x="370" y="220" width="260" height="200" rx="12" fill="#ffffff" stroke="#0d6e6e" stroke-width="3"/>
<text x="500" y="270" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#1a2332" font-weight="700">Wad</text>
