<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" width="800" height="620" font-family="Georgia, 'Noto Serif', serif">
<defs><marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2d2d2d"/></marker></defs>
<rect x="0" y="0" width="800" height="620" fill="#faf8f3"/>
<rect x="0" y="0" width="800" height="7" fill="#a45c40"/>
<text x="400" y="46" text-anchor="middle" font-size="11.0" font-weight="normal" fill="#777777">SPEECH, MEDIA &amp; TESTIMONY</text>
<text x="400" y="78" text-anchor="middle" font-size="24.0" font-weight="bold" fill="#2d2d2d">Praise Thrown Like Dust in the Face</text>
<rect x="70" y="130" width="310" height="316" rx="14" fill="#ffffff" stroke="#a33b2a" stroke-width="2" opacity="0.95"/>
<text x="225" y="162" text-anchor="middle" font-size="15.0" font-weight="bold" fill="#a33b2a">✗  Flattery</text>
<circle cx="225.0" cy="222.0" r="20.0" fill="#a33b2a"/><path d="M 189.0 304.0 a 36.0 46.0 0 0 1 72.0 0 Z" fill="#a33b2a"/>
<text x="225" y="336" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">Praise beyond the truth</text>
<text x="225" y="361" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#777777">feeds vanity</text>
<rect x="420" y="130" width="310" height="316" rx="14" fill="#ffffff" stroke="#2e6f40" stroke-width="2" opacity="0.95"/>
<text x="575" y="162" text-anchor="middle" font-size="15.0" font-weight="bold" fill="#2e6f40">✓  Fair Praise</text>
<line x1="575.0" y1="208.0" x2="575.0" y2="292.0" stroke="#2e6f40" stroke-width="6.0"/><line x1="531.0" y1="218.0" x2="619.0" y2="218.0" stroke="#2e6f40" stroke-width="6.0"/><path d="M 513.0 242.0 L 549.0 242.0 L 531.0 266.0 Z" fill="#2e6f40"/><path d="M 601.0 242.0 L 637.0 242.0 L 619.0 266.0 Z" fill="#2e6f40"/><rect x="551.0" y="292.0" width="48.0" height="8.0" fill="#2e6f40"/>
<text x="575" y="336" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">Praise measured to the fact</text>
<text x="575" y="361" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#777777">keeps both honest</text>
<line x1="400" y1="140" x2="400" y2="436" stroke="#c9c2b4" stroke-dasharray="5 5"/>
<line x1="90" y1="516" x2="710" y2="516" stroke="#c9c2b4" stroke-width="1"/>
<text x="400" y="540" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">The Prophet told those who flattered a man to his face to throw dust in his eyes</text>
<text x="400" y="559" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">instead. Excessive praise corrupts the one praised and the one praising.</text>
<text x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#a45c40">hadith — Muslim, on flattery</text>
</svg>
