<text x="225" y="361" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#777777">no true consent</text>
<rect x="420" y="130" width="310" height="316" rx="14" fill="#ffffff" stroke="#2e6f40" stroke-width="2" opacity="0.95"/>
<text x="575" y="162" text-anchor="middle" font-size="15.0" font-weight="bold" fill="#2e6f40">✓  Freely given</text>
