<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" width="800" height="620" font-family="Georgia, 'Noto Serif', serif">
<defs><marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2d2d2d"/></marker></defs>
<rect x="0" y="0" width="800" height="620" fill="#faf8f3"/>
<rect x="0" y="0" width="800" height="7" fill="#a45c40"/>
<text x="400" y="46" text-anchor="middle" font-size="11.0" font-weight="normal" fill="#777777">COMMUNITY &amp; ENVIRONMENT</text>
<text x="400" y="78" text-anchor="middle" font-size="24.0" font-weight="bold" fill="#2d2d2d">The Wall That Blocks Your Neighbour&#x27;s Light</text>
<path d="M 156.0 250.0 L 215.0 196.9 L 274.0 250.0 Z" fill="#a45c40"/><rect x="172.5" y="250.0" width="85.0" height="54.3" fill="#a45c40" opacity="0.85"/>
<text x="215" y="348" text-anchor="middle" font-size="16.0" font-weight="bold" fill="#2d2d2d">You</text>
<text x="215" y="372" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#777777">own the wall, the yard</text>
<path d="M 526.0 250.0 L 585.0 196.9 L 644.0 250.0 Z" fill="#a45c40"/><rect x="542.5" y="250.0" width="85.0" height="54.3" fill="#a45c40" opacity="0.85"/>
<text x="585" y="348" text-anchor="middle" font-size="16.0" font-weight="bold" fill="#2d2d2d">Neighbour</text>
<text x="585" y="372" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#777777">owed safety, courtesy</text>
<line x1="300" y1="250" x2="490" y2="250" stroke="#a45c40" stroke-width="3" marker-end="url(#ar)"/>
<line x1="500" y1="288" x2="310" y2="288" stroke="#a45c40" stroke-width="2" stroke-dasharray="6 4" opacity="0.7" marker-end="url(#ar)"/>
<text x="400" y="312" text-anchor="middle" font-size="11.0" font-weight="normal" fill="#777777">duty runs both directions</text>
<text x="400" y="236" text-anchor="middle" font-size="13.0" font-weight="bold" fill="#a45c40">jār — neighbour-right</text>
<line x1="90" y1="516" x2="710" y2="516" stroke="#c9c2b4" stroke-width="1"/>
<text x="400" y="540" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">A neighbour&#x27;s claim on you is not abstract kindness — it is a covenantal right you can</text>
<text x="400" y="559" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">violate by building carelessly against their wall.</text>
<text x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#a45c40">Bukhari — Kitab al-Adab, rights of the neighbour</text>
</svg>
