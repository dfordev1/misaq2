<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" width="800" height="620" font-family="Georgia, 'Noto Serif', serif">
<defs><marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2d2d2d"/></marker></defs>
<rect x="0" y="0" width="800" height="620" fill="#faf8f3"/>
<rect x="0" y="0" width="800" height="7" fill="#a45c40"/>
<text x="400" y="46" text-anchor="middle" font-size="11.0" font-weight="normal" fill="#777777">WORSHIP &amp; DISCIPLINE</text>
<text x="400" y="78" text-anchor="middle" font-size="24.0" font-weight="bold" fill="#2d2d2d">A Little Every Day Beats a Burst Once a</text>
<text x="400" y="106" text-anchor="middle" font-size="24.0" font-weight="bold" fill="#2d2d2d">Month</text>
<rect x="70" y="130" width="310" height="316" rx="14" fill="#ffffff" stroke="#a33b2a" stroke-width="2" opacity="0.95"/>
<text x="225" y="162" text-anchor="middle" font-size="15.0" font-weight="bold" fill="#a33b2a">✗  Burst</text>
<circle cx="225.0" cy="252.0" r="44.0" fill="none" stroke="#a33b2a" stroke-width="9.0"/><line x1="225.0" y1="252.0" x2="225.0" y2="226.0" stroke="#a33b2a" stroke-width="7.0"/><line x1="225.0" y1="252.0" x2="245.0" y2="262.0" stroke="#a33b2a" stroke-width="7.0"/>
<text x="225" y="336" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">All-out once, then nothing</text>
<text x="225" y="361" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#777777">pact kept in spikes</text>
<rect x="420" y="130" width="310" height="316" rx="14" fill="#ffffff" stroke="#2e6f40" stroke-width="2" opacity="0.95"/>
<text x="575" y="162" text-anchor="middle" font-size="15.0" font-weight="bold" fill="#2e6f40">✓  Steady</text>
<circle cx="575.0" cy="252.0" r="44.0" fill="none" stroke="#2e6f40" stroke-width="9.0"/><line x1="575.0" y1="252.0" x2="575.0" y2="226.0" stroke="#2e6f40" stroke-width="7.0"/><line x1="575.0" y1="252.0" x2="595.0" y2="262.0" stroke="#2e6f40" stroke-width="7.0"/>
<text x="575" y="336" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">Small act, every single day</text>
<text x="575" y="361" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#777777">pact kept in rhythm</text>
<line x1="400" y1="140" x2="400" y2="436" stroke="#c9c2b4" stroke-dasharray="5 5"/>
<line x1="90" y1="516" x2="710" y2="516" stroke="#c9c2b4" stroke-width="1"/>
<text x="400" y="540" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">The covenant favors consistency over intensity — a small deed kept daily outweighs a</text>
<text x="400" y="559" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">large one done once and abandoned.</text>
<text x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#a45c40">Bukhari, Kitab al-Riqaq — the most beloved deeds are the most consistent</text>
</svg>
