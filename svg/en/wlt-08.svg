<text x="400" y="540" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">A pledge held against a debt stays in trust until settlement. The holder may not use,</text>
<text x="400" y="559" text-anchor="middle" font-size="13.0" font-weight="normal" fill="#2d2d2d">sell, or profit from it as if it were already theirs.</text>
