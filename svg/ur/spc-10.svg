<text class="ur" x="400" y="46" text-anchor="middle" font-size="12.8" font-weight="normal" fill="#777777">گفتار، ابلاغ و شہادت</text>
<text class="ur" x="400" y="84" text-anchor="middle" font-size="27.8" font-weight="bold" fill="#2d2d2d">ایمبارگو ایک گھنٹہ پہلے توڑنا</text>
<circle cx="215.0" cy="250.0" r="51.9" fill="none" stroke="#a45c40" stroke-width="10.6"/><line x1="215.0" y1="250.0" x2="215.0" y2="219.3" stroke="#a45c40" stroke-width="8.3"/><line x1="215.0" y1="250.0" x2="238.6" y2="261.8" stroke="#a45c40" stroke-width="8.3"/>
<text class="ur" x="215" y="348" text-anchor="middle" font-size="18.6" font-weight="bold" fill="#2d2d2d">ایمبارگو کا وقت</text>
<text class="ur" x="215" y="372" text-anchor="middle" font-size="13.3" font-weight="normal" fill="#777777">دونوں کی رضامندی</text>
<rect x="552.0" y="195.7" width="66.1" height="108.6" rx="10.6" fill="#a45c40"/><rect x="561.4" y="209.9" width="47.2" height="68.4" fill="#faf8f3" opacity="0.9"/>
<text class="ur" x="585" y="348" text-anchor="middle" font-size="18.6" font-weight="bold" fill="#2d2d2d">ادارہ</text>
<text class="ur" x="585" y="372" text-anchor="middle" font-size="13.3" font-weight="normal" fill="#777777">انتظار واجب</text>
<line x1="300" y1="250" x2="490" y2="250" stroke="#a45c40" stroke-width="3" marker-end="url(#ar)"/>
<line x1="500" y1="288" x2="310" y2="288" stroke="#a45c40" stroke-width="2" stroke-dasharray="6 4" opacity="0.7" marker-end="url(#ar)"/>
<text class="ur" x="400" y="312" text-anchor="middle" font-size="12.8" font-weight="normal" fill="#777777">وقت بھی سودے کا حصہ</text>
<text class="ur" x="400" y="236" text-anchor="middle" font-size="15.1" font-weight="bold" fill="#a45c40">اپنے عقود پورے کرو</text>
<line x1="90" y1="492" x2="710" y2="492" stroke="#c9c2b4" stroke-width="1"/>
<text class="ur" x="400" y="526" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">طے شدہ اجرا کا وقت بھی ایک عہد ہے۔ فائدے کے لیے ایک گھنٹہ پہلے شائع کرنا خواہش کے</text>
<text class="ur" x="400" y="553" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">لبادے میں ٹوٹا ہوا وعدہ ہے۔</text>
<text class="lat" x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#a45c40">Q5:1</text>
