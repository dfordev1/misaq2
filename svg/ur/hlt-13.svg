<circle cx="215.0" cy="278.0" r="19.4" fill="none" stroke="#0f5257" stroke-width="4.0"/><line x1="215.0" y1="278.0" x2="215.0" y2="266.6" stroke="#0f5257" stroke-width="3.1"/><line x1="215.0" y1="278.0" x2="223.8" y2="282.4" stroke="#0f5257" stroke-width="3.1"/>
