<text class="ur" x="585" y="336" text-anchor="middle" font-size="15.7" font-weight="bold" fill="#2d2d2d">جسم کا حق</text>
<text class="ur" x="585" y="352" text-anchor="middle" font-size="13.3" font-weight="normal" fill="#777777">جو واپس واجب ہے</text>
<text class="ur" x="400" y="424" text-anchor="middle" font-size="14.5" font-weight="normal" fill="#777777">جسم کا تم پر حق ہے</text>
<line x1="90" y1="492" x2="710" y2="492" stroke="#c9c2b4" stroke-width="1"/>
<text class="ur" x="400" y="526" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">تمہارے جسم کا تم پر حق ہے جسے عزائم بھی نظرانداز نہیں کر سکتے — آرام سستی نہیں، عہد</text>
<text class="ur" x="400" y="553" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">کا قرض ہے۔</text>
<text class="lat" x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#0f5257">حدیث — تیرے جسم کا تجھ پر حق ہے</text>
