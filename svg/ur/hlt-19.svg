<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" width="800" height="620" font-family="'Noto Nastaliq Urdu', 'Urdu Typesetting', serif">
<defs><style>text{font-family:'Noto Nastaliq Urdu', 'Urdu Typesetting', serif;direction:rtl;unicode-bidi:isolate;}text.lat{font-family:Georgia, 'Noto Serif', serif;direction:ltr;}</style><marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2d2d2d"/></marker></defs>
<rect x="0" y="0" width="800" height="620" fill="#faf8f3"/>
<rect x="0" y="0" width="800" height="7" fill="#a45c40"/>
<text class="ur" x="400" y="46" text-anchor="middle" font-size="12.8" font-weight="normal" fill="#777777">صحت، بدن و طب</text>
<text class="ur" x="400" y="84" text-anchor="middle" font-size="27.8" font-weight="bold" fill="#2d2d2d">چارٹ جس نے کچھ غلط ہونا نہ بتایا</text>
<rect x="70" y="130" width="310" height="316" rx="14" fill="#ffffff" stroke="#a33b2a" stroke-width="2" opacity="0.95"/>
<text class="ur" x="225" y="162" text-anchor="middle" font-size="17.4" font-weight="bold" fill="#a33b2a">✗  چھپایا گیا</text>
<path d="M 203.0 246.0 L 203.0 226.0 a 22.0 22.0 0 0 1 44.0 0 L 247.0 246.0" fill="none" stroke="#a33b2a" stroke-width="9.0"/><rect x="191.0" y="246.0" width="68.0" height="48.0" rx="6.0" fill="#a33b2a"/>
<text class="ur" x="225" y="336" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">غلطی چارٹ میں دفن</text>
<text class="ur" x="225" y="361" text-anchor="middle" font-size="13.3" font-weight="normal" fill="#777777">امانت دو بار ٹوٹی</text>
<rect x="420" y="130" width="310" height="316" rx="14" fill="#ffffff" stroke="#2e6f40" stroke-width="2" opacity="0.95"/>
<text class="ur" x="575" y="162" text-anchor="middle" font-size="17.4" font-weight="bold" fill="#2e6f40">✓  ظاہر کیا گیا</text>
<rect x="543.0" y="208.0" width="64.0" height="88.0" rx="5.0" fill="#2e6f40"/><rect x="555.0" y="224.0" width="40.0" height="5.0" fill="#ffffff" opacity="0.85"/><rect x="555.0" y="241.0" width="40.0" height="5.0" fill="#ffffff" opacity="0.85"/><rect x="555.0" y="258.0" width="40.0" height="5.0" fill="#ffffff" opacity="0.85"/><rect x="555.0" y="275.0" width="40.0" height="5.0" fill="#ffffff" opacity="0.85"/>
<text class="ur" x="575" y="336" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">غلطی مریض کو صاف بتائی</text>
<text class="ur" x="575" y="361" text-anchor="middle" font-size="13.3" font-weight="normal" fill="#777777">ناکامی میں بھی امانت قائم</text>
<line x1="400" y1="140" x2="400" y2="436" stroke="#c9c2b4" stroke-dasharray="5 5"/>
<line x1="90" y1="492" x2="710" y2="492" stroke="#c9c2b4" stroke-width="1"/>
<text class="ur" x="400" y="526" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">غلطی کرنے والے معالج پر مریض کو سچ بتانا واجب ہے — ریکارڈ میں دفن کرنا زخم پر خیانت</text>
<text class="ur" x="400" y="553" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">کا اضافہ ہے۔</text>
<text class="lat" x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#a45c40">حدیث — منافق کی نشانیوں میں امانت میں خیانت</text>
</svg>
