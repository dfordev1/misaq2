<text class="ur" x="215" y="336" text-anchor="middle" font-size="15.7" font-weight="bold" fill="#2d2d2d">لیا گیا انتظامی</text>
<text class="ur" x="215" y="362" text-anchor="middle" font-size="15.7" font-weight="bold" fill="#2d2d2d">خرچ</text>
<text class="ur" x="215" y="368" text-anchor="middle" font-size="13.3" font-weight="normal" fill="#777777">جمع کرنے والوں کی اجرت</text>
