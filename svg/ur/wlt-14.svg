<text class="ur" x="585" y="336" text-anchor="middle" font-size="15.7" font-weight="bold" fill="#2d2d2d">مستحق تک پہنچا</text>
<text class="ur" x="585" y="352" text-anchor="middle" font-size="13.3" font-weight="normal" fill="#777777">آٹھ مقررہ زمرے</text>
<text class="ur" x="400" y="424" text-anchor="middle" font-size="14.5" font-weight="normal" fill="#777777">انتظام صرف اپنے مناسب حصے میں جائز</text>
<line x1="90" y1="492" x2="710" y2="492" stroke="#c9c2b4" stroke-width="1"/>
<text class="ur" x="400" y="526" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">زکوٰۃ جمع کرنے والے خود ایک مقررہ زمرے میں فنڈ سے منصفانہ اجرت کے حق دار ہیں۔ مگر</text>
<text class="ur" x="400" y="553" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">انتظامی خرچ متناسب رہے، عطیہ نگل نہ جائے۔</text>
<text class="lat" x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#4a4a68">Q9:60</text>
