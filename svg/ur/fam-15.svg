<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" width="800" height="620" font-family="'Noto Nastaliq Urdu', 'Urdu Typesetting', serif">
<defs><style>text{font-family:'Noto Nastaliq Urdu', 'Urdu Typesetting', serif;direction:rtl;unicode-bidi:isolate;}text.lat{font-family:Georgia, 'Noto Serif', serif;direction:ltr;}</style><marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2d2d2d"/></marker></defs>
<rect x="0" y="0" width="800" height="620" fill="#faf8f3"/>
<rect x="0" y="0" width="800" height="7" fill="#a45c40"/>
<text class="ur" x="400" y="46" text-anchor="middle" font-size="12.8" font-weight="normal" fill="#777777">خاندان و ذاتی زندگی</text>
<text class="ur" x="400" y="84" text-anchor="middle" font-size="27.8" font-weight="bold" fill="#2d2d2d">وہ دکان جو والد نے بنائی</text>
<rect x="180" y="178" width="440" height="62" rx="10" fill="#a45c40" opacity="0.30"/>
<text class="ur" x="400" y="208" text-anchor="middle" font-size="15.7" font-weight="bold" fill="#2d2d2d">منافع منصفانہ تقسیم</text>
<text class="ur" x="400" y="227" text-anchor="middle" font-size="12.8" font-weight="normal" fill="#2d2d2d">حصے حق کے مطابق، پسند کے نہیں</text>
<rect x="158" y="252" width="485" height="62" rx="10" fill="#a45c40" opacity="0.48"/>
<text class="ur" x="400" y="282" text-anchor="middle" font-size="15.7" font-weight="bold" fill="#2d2d2d">ایماندار حساب کتاب</text>
<text class="ur" x="400" y="301" text-anchor="middle" font-size="12.8" font-weight="normal" fill="#2d2d2d">رشتہ داروں میں کھلا حساب</text>
<rect x="135" y="326" width="530" height="62" rx="10" fill="#a45c40" opacity="0.66"/>
<text class="ur" x="400" y="356" text-anchor="middle" font-size="15.7" font-weight="bold" fill="#2d2d2d">رشتہ داروں کا باہمی اعتماد</text>
<text class="ur" x="400" y="375" text-anchor="middle" font-size="12.8" font-weight="normal" fill="#2d2d2d">وہ بنیاد جس پر دکان قائم ہے</text>
<text class="ur" x="400" y="162" text-anchor="middle" font-size="13.9" font-weight="normal" fill="#777777">نیچے سے اوپر پڑھیں</text>
<line x1="90" y1="492" x2="710" y2="492" stroke="#c9c2b4" stroke-width="1"/>
<text class="ur" x="400" y="526" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">خاندانی کاروبار سرمائے سے پہلے رشتہ داروں کے باہمی اعتماد پر قائم ہے: کام کرنے والے</text>
<text class="ur" x="400" y="553" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">رشتہ داروں کو منصفانہ اجرت، ایماندار حساب، اور حق کے مطابق حصے۔</text>
<text class="lat" x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#a45c40">Q4:58</text>
</svg>
