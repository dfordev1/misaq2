<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" width="800" height="620" font-family="'Noto Nastaliq Urdu', 'Urdu Typesetting', serif">
<defs><style>text{font-family:'Noto Nastaliq Urdu', 'Urdu Typesetting', serif;direction:rtl;unicode-bidi:isolate;}text.lat{font-family:Georgia, 'Noto Serif', serif;direction:ltr;}</style><marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2d2d2d"/></marker></defs>
<rect x="0" y="0" width="800" height="620" fill="#faf8f3"/>
<rect x="0" y="0" width="800" height="7" fill="#a45c40"/>
<text class="ur" x="400" y="46" text-anchor="middle" font-size="12.8" font-weight="normal" fill="#777777">اضطرار و مشکل مسائل</text>
<text class="ur" x="400" y="84" text-anchor="middle" font-size="27.8" font-weight="bold" fill="#2d2d2d">چوکی دار جس نے گولہ باری میں پھاٹک</text>
<text class="ur" x="400" y="131" text-anchor="middle" font-size="27.8" font-weight="bold" fill="#2d2d2d">چھوڑا</text>
<path d="M 130.0 220.8 L 166.8 237.4 L 166.8 274.2 C 166.8 296.3 148.4 307.3 130.0 312.8 C 111.6 307.3 93.2 296.3 93.2 274.2 L 93.2 237.4 Z" fill="#a45c40"/>
<text class="ur" x="130" y="332" text-anchor="middle" font-size="14.5" font-weight="normal" fill="#2d2d2d">چوکی پر حملہ</text>
<line x1="180" y1="265" x2="298" y2="265" stroke="#2d2d2d" stroke-width="2" marker-end="url(#ar)"/>
<path d="M 400 161 L 504 265 L 400 369 L 296 265 Z" fill="#ffffff" stroke="#a45c40" stroke-width="2.5"/>
<text class="ur" x="400" y="246" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#a45c40">قائم رکھنا</text>
<text class="ur" x="400" y="270" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#a45c40">واقعی ناممکن</text>
<text class="ur" x="400" y="295" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#a45c40">تھا؟</text>
<line x1="510" y1="236" x2="596" y2="210" stroke="#2e6f40" stroke-width="2" marker-end="url(#ar)"/>
<rect x="600" y="180" width="150" height="62" rx="10" fill="#2e6f40" opacity="0.9"/>
<text class="ur" x="675" y="204" text-anchor="middle" font-size="13.9" font-weight="bold" fill="#faf8f3">پسپائی، خیانت</text>
<text class="ur" x="675" y="227" text-anchor="middle" font-size="13.9" font-weight="bold" fill="#faf8f3">نہیں</text>
<text class="ur" x="675" y="172" text-anchor="middle" font-size="12.2" font-weight="normal" fill="#777777">yes</text>
<line x1="510" y1="296" x2="596" y2="352" stroke="#a33b2a" stroke-width="2" marker-end="url(#ar)"/>
<rect x="600" y="322" width="150" height="62" rx="10" fill="#a33b2a" opacity="0.9"/>
<text class="ur" x="675" y="346" text-anchor="middle" font-size="13.9" font-weight="bold" fill="#faf8f3">فرار — خیانت</text>
<text class="ur" x="675" y="314" text-anchor="middle" font-size="12.2" font-weight="normal" fill="#777777">no</text>
<line x1="90" y1="492" x2="710" y2="492" stroke="#c9c2b4" stroke-width="1"/>
<text class="ur" x="400" y="526" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">سونپی ہوئی چوکی چھوڑنا خیانت ہے، سوائے اس کے کہ اسے قائم رکھنا ہی ناممکن ہو جائے یا</text>
<text class="ur" x="400" y="553" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">کوئی راحت کے لیے آ جائے۔</text>
<text class="lat" x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#a45c40">GLOSSARY.md — khiyanah, betrayal of a post held in trust</text>
