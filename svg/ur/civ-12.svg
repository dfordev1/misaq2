<line x1="90" y1="492" x2="710" y2="492" stroke="#c9c2b4" stroke-width="1"/>
<text class="ur" x="400" y="526" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">ریاستوں کے درمیان معاہدہ بھی ایک عہد ہے؛ مدت ختم ہونے سے پہلے چپکے سے دوبارہ مسلح</text>
<text class="ur" x="400" y="553" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">ہونا حکمت عملی کے روپ میں خیانت ہے۔</text>
<text class="lat" x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#4a4a68">Q9:4</text>
