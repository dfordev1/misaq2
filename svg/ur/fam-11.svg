<text class="ur" x="400" y="480" text-anchor="middle" font-size="15.1" font-weight="bold" fill="#2d2d2d">سرپرست نگہبان ہے، کبھی مالک نہیں</text>
<line x1="90" y1="492" x2="710" y2="492" stroke="#c9c2b4" stroke-width="1"/>
<text class="ur" x="400" y="526" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">کفالت میں لیا گیا بچہ، خواہ گود لیا ہو یا غیر رسمی، امانت ہے: اس کی فلاح، مال اور</text>
<text class="ur" x="400" y="553" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">اصل نسب محفوظ رہیں، ضم نہ کیے جائیں۔</text>
<text class="lat" x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#a45c40">Q4:58 — امانتیں اہل کے سپرد کرو</text>
