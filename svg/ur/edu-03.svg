<text class="ur" x="400" y="392" text-anchor="middle" font-size="14.5" font-weight="normal" fill="#777777">سندِ روایت: ہر کڑی اپنے حصے کی جواب دہ</text>
<line x1="90" y1="492" x2="710" y2="492" stroke="#c9c2b4" stroke-width="1"/>
<text class="ur" x="400" y="526" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">حاصل کیا علم امانت ہے، ذاتی ملکیت نہیں؛ یہ استاد سے شاگرد اور اگلے سیکھنے والے تک</text>
<text class="ur" x="400" y="553" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">بلا انقطاع منتقل ہوتا ہے۔</text>
<text class="lat" x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#b8860b">بخاری — مجھ سے پہنچاؤ، خواہ ایک آیت ہی سہی</text>
