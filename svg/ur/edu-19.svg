<text class="ur" x="566" y="302" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#faf8f3">جوں کا توں</text>
<text class="ur" x="566" y="326" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#faf8f3">پہنچایا</text>
<text class="ur" x="400" y="392" text-anchor="middle" font-size="14.5" font-weight="normal" fill="#777777">نہ خاموش ترمیم، نہ آسان چھوٹ</text>
<line x1="90" y1="492" x2="710" y2="492" stroke="#c9c2b4" stroke-width="1"/>
<text class="ur" x="400" y="526" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">مقدس یا علمی متن کو درست، بلا خاموش ترمیم یا آسان چھوٹ کے آگے پہنچانا ہر بعد میں</text>
<text class="ur" x="400" y="553" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">بھروسہ کرنے والے سے وفا ہے۔</text>
<text class="lat" x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#6b4c9a">Q15:9 — ہم نے ذکر نازل کیا اور ہم اس کے محافظ ہیں</text>
