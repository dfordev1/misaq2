<text class="ur" x="400" y="392" text-anchor="middle" font-size="14.5" font-weight="normal" fill="#777777">قرآن رخصتی کو بھی منظم کرتا ہے، صرف آغاز کو نہیں</text>
<line x1="90" y1="492" x2="710" y2="492" stroke="#c9c2b4" stroke-width="1"/>
<text class="ur" x="400" y="526" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">طلاق ایک مقررہ عدت سے گزرتی ہے، صلح کی گنجائش دیتے ہوئے، پھر عہد ختم ہوتا ہے —</text>
<text class="ur" x="400" y="553" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">رخصتی ایک عمل ہے، آنی جانی بات نہیں۔</text>
<text class="lat" x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#a45c40">Q2:228</text>
