<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" width="800" height="620" font-family="'Noto Nastaliq Urdu', 'Urdu Typesetting', serif">
<defs><style>text{font-family:'Noto Nastaliq Urdu', 'Urdu Typesetting', serif;direction:rtl;unicode-bidi:isolate;}text.lat{font-family:Georgia, 'Noto Serif', serif;direction:ltr;}</style><marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2d2d2d"/></marker></defs>
<rect x="0" y="0" width="800" height="620" fill="#faf8f3"/>
<rect x="0" y="0" width="800" height="7" fill="#4a4a68"/>
<text class="ur" x="400" y="46" text-anchor="middle" font-size="12.8" font-weight="normal" fill="#777777">سیرتِ نبوی: معاہدات کا عملی نمونہ</text>
<text class="ur" x="400" y="84" text-anchor="middle" font-size="27.8" font-weight="bold" fill="#2d2d2d">معاہدہ ختم کرنا: کھلا اعلان، خیانت</text>
<text class="ur" x="400" y="131" text-anchor="middle" font-size="27.8" font-weight="bold" fill="#2d2d2d">نہیں</text>
<rect x="100.6" y="224.5" width="58.9" height="81.0" rx="4.6" fill="#4a4a68"/><rect x="111.6" y="239.2" width="36.8" height="4.6" fill="#faf8f3" opacity="0.85"/><rect x="111.6" y="254.9" width="36.8" height="4.6" fill="#faf8f3" opacity="0.85"/><rect x="111.6" y="270.5" width="36.8" height="4.6" fill="#faf8f3" opacity="0.85"/><rect x="111.6" y="286.2" width="36.8" height="4.6" fill="#faf8f3" opacity="0.85"/>
<text class="ur" x="130" y="332" text-anchor="middle" font-size="14.5" font-weight="normal" fill="#2d2d2d">معاہدہ دباؤ</text>
<text class="ur" x="130" y="356" text-anchor="middle" font-size="14.5" font-weight="normal" fill="#2d2d2d">میں</text>
<line x1="180" y1="265" x2="298" y2="265" stroke="#2d2d2d" stroke-width="2" marker-end="url(#ar)"/>
<path d="M 400 161 L 504 265 L 400 369 L 296 265 Z" fill="#ffffff" stroke="#4a4a68" stroke-width="2.5"/>
<text class="ur" x="400" y="246" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#4a4a68">کیا اعلان</text>
<text class="ur" x="400" y="270" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#4a4a68">کھلے عام دیا</text>
<text class="ur" x="400" y="295" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#4a4a68">گیا؟</text>
<line x1="510" y1="236" x2="596" y2="210" stroke="#2e6f40" stroke-width="2" marker-end="url(#ar)"/>
<rect x="600" y="180" width="150" height="62" rx="10" fill="#2e6f40" opacity="0.9"/>
<text class="ur" x="675" y="204" text-anchor="middle" font-size="13.9" font-weight="bold" fill="#faf8f3">جائز طور پر ختم</text>
<text class="ur" x="675" y="172" text-anchor="middle" font-size="12.2" font-weight="normal" fill="#777777">yes</text>
<line x1="510" y1="296" x2="596" y2="352" stroke="#a33b2a" stroke-width="2" marker-end="url(#ar)"/>
<rect x="600" y="322" width="150" height="62" rx="10" fill="#a33b2a" opacity="0.9"/>
<text class="ur" x="675" y="346" text-anchor="middle" font-size="13.9" font-weight="bold" fill="#faf8f3">خیانت — بدعہدی</text>
<text class="ur" x="675" y="314" text-anchor="middle" font-size="12.2" font-weight="normal" fill="#777777">no</text>
<line x1="90" y1="492" x2="710" y2="492" stroke="#c9c2b4" stroke-width="1"/>
<text class="ur" x="400" y="526" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">آیت ۸:۵۸ معاہدہ کالعدم کرنے سے پہلے کھلا اعلان لازم قرار دیتی ہے — خفیہ طور پر</text>
<text class="ur" x="400" y="553" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">توڑنا خیانت ہے۔</text>
<text class="lat" x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#4a4a68">Q8:58</text>
