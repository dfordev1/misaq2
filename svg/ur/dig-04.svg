<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" width="800" height="620" font-family="'Noto Nastaliq Urdu', 'Urdu Typesetting', serif">
<defs><style>text{font-family:'Noto Nastaliq Urdu', 'Urdu Typesetting', serif;direction:rtl;unicode-bidi:isolate;}text.lat{font-family:Georgia, 'Noto Serif', serif;direction:ltr;}</style><marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2d2d2d"/></marker></defs>
<rect x="0" y="0" width="800" height="620" fill="#faf8f3"/>
<rect x="0" y="0" width="800" height="7" fill="#a45c40"/>
<text class="ur" x="400" y="46" text-anchor="middle" font-size="12.8" font-weight="normal" fill="#777777">ڈیجیٹل دنیا و ٹیکنالوجی</text>
<text class="ur" x="400" y="84" text-anchor="middle" font-size="27.8" font-weight="bold" fill="#2d2d2d">لاگ اِن جو ایک کام کے لیے دیا گیا</text>
<path d="M 109.8 259.5 L 109.8 241.1 a 20.2 20.2 0 0 1 40.5 0 L 150.2 259.5" fill="none" stroke="#a45c40" stroke-width="8.3"/><rect x="98.7" y="259.5" width="62.6" height="44.2" rx="5.5" fill="#a45c40"/>
<text class="ur" x="130" y="332" text-anchor="middle" font-size="14.5" font-weight="normal" fill="#2d2d2d">رسائی دی گئی</text>
<line x1="180" y1="265" x2="298" y2="265" stroke="#2d2d2d" stroke-width="2" marker-end="url(#ar)"/>
<path d="M 400 161 L 504 265 L 400 369 L 296 265 Z" fill="#ffffff" stroke="#a45c40" stroke-width="2.5"/>
<text class="ur" x="400" y="246" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#a45c40">کیا صرف طے</text>
<text class="ur" x="400" y="270" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#a45c40">شدہ استعمال</text>
<text class="ur" x="400" y="295" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#a45c40">کیا؟</text>
<line x1="510" y1="236" x2="596" y2="210" stroke="#2e6f40" stroke-width="2" marker-end="url(#ar)"/>
<rect x="600" y="180" width="150" height="62" rx="10" fill="#2e6f40" opacity="0.9"/>
<text class="ur" x="675" y="204" text-anchor="middle" font-size="13.9" font-weight="bold" fill="#faf8f3">امانت نبھائی</text>
<text class="ur" x="675" y="172" text-anchor="middle" font-size="12.2" font-weight="normal" fill="#777777">yes</text>
<line x1="510" y1="296" x2="596" y2="352" stroke="#a33b2a" stroke-width="2" marker-end="url(#ar)"/>
<rect x="600" y="322" width="150" height="62" rx="10" fill="#a33b2a" opacity="0.9"/>
<text class="ur" x="675" y="346" text-anchor="middle" font-size="13.9" font-weight="bold" fill="#faf8f3">خیانت — حد سے</text>
<text class="ur" x="675" y="369" text-anchor="middle" font-size="13.9" font-weight="bold" fill="#faf8f3">تجاوز</text>
<text class="ur" x="675" y="314" text-anchor="middle" font-size="12.2" font-weight="normal" fill="#777777">no</text>
<line x1="90" y1="492" x2="710" y2="492" stroke="#c9c2b4" stroke-width="1"/>
<text class="ur" x="400" y="526" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">ایک کام کے لیے دیا پاس ورڈ محدود امانت ہے۔ اسے کام سے آگے استعمال کرنا، یا بعد میں</text>
<text class="ur" x="400" y="553" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">روک لینا، آسانی نہیں خیانت ہے۔</text>
<text class="lat" x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#a45c40">بخاری — &#x27;امانت واپس کرو&#x27;</text>
</svg>
