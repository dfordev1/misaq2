<text class="ur" x="400" y="526" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">علاج کے لیے پلیٹ فارم کو دیا گیا طبی ڈیٹا اب بھی امانت ہے — منافع کے لیے آگے بیچنا</text>
