<text class="ur" x="335" y="378" text-anchor="middle" font-size="13.3" font-weight="normal" fill="#2d2d2d">مطالعہ گاہیں</text>
<text class="ur" x="400" y="480" text-anchor="middle" font-size="15.1" font-weight="bold" fill="#2d2d2d">لائبریری امین ہے، کسی ایک قاری کی ملکیت نہیں</text>
<line x1="90" y1="492" x2="710" y2="492" stroke="#c9c2b4" stroke-width="1"/>
<text class="ur" x="400" y="526" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">لائبریری کی کتابیں، جرائد اور مطالعہ گاہیں مشترکہ امانت ہیں؛ ذخیرہ کرنا، خراب کرنا</text>
<text class="ur" x="400" y="553" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">یا واپس نہ کرنا ہر آنے والے قاری سے چوری ہے۔</text>
<text class="lat" x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#4a4a68">Q4:58 — امانتیں مالکوں کے سپرد کرو</text>
