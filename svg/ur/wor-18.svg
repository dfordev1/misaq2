<text class="ur" x="215" y="372" text-anchor="middle" font-size="13.3" font-weight="normal" fill="#777777">جگہ و لمحہ دینے کی</text>
<text class="ur" x="215" y="394" text-anchor="middle" font-size="13.3" font-weight="normal" fill="#777777">ذمہ دار</text>
