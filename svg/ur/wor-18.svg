<text class="ur" x="400" y="526" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">کام کی جگہ عہد کو معطل نہیں کرتی۔ نماز مزدور کے ساتھ سفر کرتی ہے، وقفے کے کمرے یا</text>
<text class="ur" x="400" y="553" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">زینے تک بھی۔</text>
<text class="lat" x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#a45c40">Q17:34 — the covenant will be asked about</text>
