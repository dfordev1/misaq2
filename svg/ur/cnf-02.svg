<text class="ur" x="400" y="526" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">جب مومنوں کے دو گروہ لڑیں تو برادری کا فرض عدل سے صلح کرانا ہے، نہ کہ کسی ایک طرف</text>
