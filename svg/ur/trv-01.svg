<text class="ur" x="400" y="312" text-anchor="middle" font-size="12.8" font-weight="normal" fill="#777777">حفاظت تا سلامتی</text>
<text class="ur" x="400" y="236" text-anchor="middle" font-size="15.1" font-weight="bold" fill="#a45c40">امان — ایک پختہ عہد</text>
<line x1="90" y1="492" x2="710" y2="492" stroke="#c9c2b4" stroke-width="1"/>
<text class="ur" x="400" y="526" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">خطرے سے بھاگنے والے کو امان دینے کے بعد اس کی حفاظت واجب ہے، یہاں تک کہ وہ محفوظ</text>
<text class="ur" x="400" y="553" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">مقام تک پہنچ جائے، چاہے اس سے اختلاف ہی کیوں نہ ہو۔</text>
<text class="lat" x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#a45c40">Q9:6</text>
