<text class="ur" x="215" y="372" text-anchor="middle" font-size="13.3" font-weight="normal" fill="#777777">امان دیتا ہے</text>
<circle cx="585.0" cy="214.6" r="23.6" fill="#a45c40"/><path d="M 542.5 311.4 a 42.5 54.3 0 0 1 85.0 0 Z" fill="#a45c40"/>
