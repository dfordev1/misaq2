<text class="ur" x="400" y="526" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">پولیس کو تفویض شدہ طاقت حفاظت کے لیے ہے، زیادتی کے لیے نہیں؛ اس طاقت کو جوابدہ</text>
<text class="ur" x="400" y="553" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">بنانا اسی امانت کو قائم رکھنا ہے جس پر وہ دی گئی۔</text>
<text class="lat" x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#4a4a68">Q4:58</text>
