<text class="ur" x="215" y="372" text-anchor="middle" font-size="13.3" font-weight="normal" fill="#777777">تفویض شدہ طاقت رکھتا</text>
<text class="ur" x="215" y="394" text-anchor="middle" font-size="13.3" font-weight="normal" fill="#777777">ہے</text>
