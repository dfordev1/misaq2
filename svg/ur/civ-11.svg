<text class="ur" x="400" y="312" text-anchor="middle" font-size="12.8" font-weight="normal" fill="#777777">اس کے استعمال پر جوابدہ</text>
<text class="ur" x="400" y="236" text-anchor="middle" font-size="15.1" font-weight="bold" fill="#4a4a68">جبری طاقت کی امانت</text>
