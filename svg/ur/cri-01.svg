<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" width="800" height="620" font-family="'Noto Nastaliq Urdu', 'Urdu Typesetting', serif">
<defs><style>text{font-family:'Noto Nastaliq Urdu', 'Urdu Typesetting', serif;direction:rtl;unicode-bidi:isolate;}text.lat{font-family:Georgia, 'Noto Serif', serif;direction:ltr;}</style><marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2d2d2d"/></marker></defs>
<rect x="0" y="0" width="800" height="620" fill="#faf8f3"/>
<rect x="0" y="0" width="800" height="7" fill="#a45c40"/>
<text class="ur" x="400" y="46" text-anchor="middle" font-size="12.8" font-weight="normal" fill="#777777">اضطرار و مشکل مسائل</text>
<text class="ur" x="400" y="84" text-anchor="middle" font-size="27.8" font-weight="bold" fill="#2d2d2d">بقا کے لیے حرام کھانا</text>
<circle cx="130.0" cy="237.4" r="18.4" fill="#a45c40"/><path d="M 96.9 312.8 a 33.1 42.3 0 0 1 66.2 0 Z" fill="#a45c40"/>
<text class="ur" x="130" y="332" text-anchor="middle" font-size="14.5" font-weight="normal" fill="#2d2d2d">بھوکا، حلال</text>
<text class="ur" x="130" y="356" text-anchor="middle" font-size="14.5" font-weight="normal" fill="#2d2d2d">ناپید</text>
<line x1="180" y1="265" x2="298" y2="265" stroke="#2d2d2d" stroke-width="2" marker-end="url(#ar)"/>
<path d="M 400 161 L 504 265 L 400 369 L 296 265 Z" fill="#ffffff" stroke="#a45c40" stroke-width="2.5"/>
<text class="ur" x="400" y="258" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#a45c40">صرف خطرہ</text>
<text class="ur" x="400" y="282" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#a45c40">ٹالنے قدر؟</text>
<line x1="510" y1="236" x2="596" y2="210" stroke="#2e6f40" stroke-width="2" marker-end="url(#ar)"/>
<rect x="600" y="180" width="150" height="62" rx="10" fill="#2e6f40" opacity="0.9"/>
