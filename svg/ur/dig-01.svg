<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" width="800" height="620" font-family="'Noto Nastaliq Urdu', 'Urdu Typesetting', serif">
<defs><style>text{font-family:'Noto Nastaliq Urdu', 'Urdu Typesetting', serif;direction:rtl;unicode-bidi:isolate;}text.lat{font-family:Georgia, 'Noto Serif', serif;direction:ltr;}</style><marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2d2d2d"/></marker></defs>
<rect x="0" y="0" width="800" height="620" fill="#faf8f3"/>
<rect x="0" y="0" width="800" height="7" fill="#a45c40"/>
<text class="ur" x="400" y="46" text-anchor="middle" font-size="12.8" font-weight="normal" fill="#777777">ڈیجیٹل دنیا و ٹیکنالوجی</text>
<text class="ur" x="400" y="84" text-anchor="middle" font-size="27.8" font-weight="bold" fill="#2d2d2d">شرائط جو بغیر پڑھے قبول کیں</text>
<rect x="182.0" y="195.7" width="66.1" height="108.6" rx="10.6" fill="#a45c40"/><rect x="191.4" y="209.9" width="47.2" height="68.4" fill="#faf8f3" opacity="0.9"/>
<text class="ur" x="215" y="348" text-anchor="middle" font-size="18.6" font-weight="bold" fill="#2d2d2d">پلیٹ فارم</text>
<text class="ur" x="215" y="372" text-anchor="middle" font-size="13.3" font-weight="normal" fill="#777777">بیان کردہ سروس واجب</text>
<circle cx="585.0" cy="214.6" r="23.6" fill="#a45c40"/><path d="M 542.5 311.4 a 42.5 54.3 0 0 1 85.0 0 Z" fill="#a45c40"/>
<text class="ur" x="585" y="348" text-anchor="middle" font-size="18.6" font-weight="bold" fill="#2d2d2d">صارف</text>
<text class="ur" x="585" y="372" text-anchor="middle" font-size="13.3" font-weight="normal" fill="#777777">دیانتدار استعمال</text>
<text class="ur" x="585" y="394" text-anchor="middle" font-size="13.3" font-weight="normal" fill="#777777">واجب</text>
<line x1="300" y1="250" x2="490" y2="250" stroke="#a45c40" stroke-width="3" marker-end="url(#ar)"/>
<line x1="500" y1="288" x2="310" y2="288" stroke="#a45c40" stroke-width="2" stroke-dasharray="6 4" opacity="0.7" marker-end="url(#ar)"/>
<text class="ur" x="400" y="312" text-anchor="middle" font-size="12.8" font-weight="normal" fill="#777777">دونوں طرف جوابدہی</text>
<text class="ur" x="400" y="212" text-anchor="middle" font-size="15.1" font-weight="bold" fill="#a45c40">عقود — رضامندی سے</text>
<text class="ur" x="400" y="237" text-anchor="middle" font-size="15.1" font-weight="bold" fill="#a45c40">پابند</text>
<line x1="90" y1="492" x2="710" y2="492" stroke="#c9c2b4" stroke-width="1"/>
<text class="ur" x="400" y="526" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">کسی سروس کی شرائط پر &#x27;مانتا ہوں&#x27; دبانا ایک حقیقی عقد ہے۔ خاموش، باشعور رضامندی بھی</text>
<text class="ur" x="400" y="553" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">آپ کو اپنا حصہ نبھانے کا پابند کرتی ہے۔</text>
<text class="lat" x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#a45c40">Q5:1 — &quot;اپنے عقود پورے کرو&quot;</text>
</svg>
