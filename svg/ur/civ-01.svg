<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" width="800" height="620" font-family="'Noto Nastaliq Urdu', 'Urdu Typesetting', serif">
<defs><style>text{font-family:'Noto Nastaliq Urdu', 'Urdu Typesetting', serif;direction:rtl;unicode-bidi:isolate;}text.lat{font-family:Georgia, 'Noto Serif', serif;direction:ltr;}</style><marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2d2d2d"/></marker></defs>
<rect x="0" y="0" width="800" height="620" fill="#faf8f3"/>
<rect x="0" y="0" width="800" height="7" fill="#4a4a68"/>
<text class="ur" x="400" y="46" text-anchor="middle" font-size="12.8" font-weight="normal" fill="#777777">شہری زندگی و قانون</text>
<text class="ur" x="400" y="84" text-anchor="middle" font-size="27.8" font-weight="bold" fill="#2d2d2d">آپ کا ووٹ ترجیح نہیں، ایک عہد</text>
<path d="M 156.0 266.5 L 203.2 231.1 L 226.8 231.1 L 274.0 266.5 L 255.1 285.4 L 215.0 257.1 L 174.9 285.4 Z" fill="#4a4a68"/>
<text class="ur" x="215" y="348" text-anchor="middle" font-size="18.6" font-weight="bold" fill="#2d2d2d">شہری</text>
<text class="ur" x="215" y="372" text-anchor="middle" font-size="13.3" font-weight="normal" fill="#777777">عہد دیتا ہے</text>
<circle cx="585.0" cy="214.6" r="23.6" fill="#4a4a68"/><path d="M 542.5 311.4 a 42.5 54.3 0 0 1 85.0 0 Z" fill="#4a4a68"/>
<text class="ur" x="585" y="348" text-anchor="middle" font-size="18.6" font-weight="bold" fill="#2d2d2d">امیدوار</text>
<text class="ur" x="585" y="372" text-anchor="middle" font-size="13.3" font-weight="normal" fill="#777777">خدمت کا اعتماد پاتا</text>
<text class="ur" x="585" y="394" text-anchor="middle" font-size="13.3" font-weight="normal" fill="#777777">ہے</text>
<line x1="300" y1="250" x2="490" y2="250" stroke="#4a4a68" stroke-width="3" marker-end="url(#ar)"/>
<line x1="500" y1="288" x2="310" y2="288" stroke="#4a4a68" stroke-width="2" stroke-dasharray="6 4" opacity="0.7" marker-end="url(#ar)"/>
<text class="ur" x="400" y="312" text-anchor="middle" font-size="12.8" font-weight="normal" fill="#777777">اللہ کے حضور جوابدہ</text>
<text class="ur" x="400" y="236" text-anchor="middle" font-size="15.1" font-weight="bold" fill="#4a4a68">بیعت — ہاتھ پر ہاتھ</text>
<line x1="90" y1="492" x2="710" y2="492" stroke="#c9c2b4" stroke-width="1"/>
<text class="ur" x="400" y="526" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">ووٹ کو بیعت کی طرح لیا جاتا ہے: اعتماد کا ہاتھ کسی امیدوار کو دیا جانا، جس کی</text>
<text class="ur" x="400" y="553" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">جوابدہی اللہ کے حضور ہے کہ آپ نے کسے اختیار سونپا۔</text>
<text class="lat" x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#4a4a68">Q48:10</text>
</svg>
