<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" width="800" height="620" font-family="'Noto Nastaliq Urdu', 'Urdu Typesetting', serif">
<defs><style>text{font-family:'Noto Nastaliq Urdu', 'Urdu Typesetting', serif;direction:rtl;unicode-bidi:isolate;}text.lat{font-family:Georgia, 'Noto Serif', serif;direction:ltr;}</style><marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2d2d2d"/></marker></defs>
<rect x="0" y="0" width="800" height="620" fill="#faf8f3"/>
<rect x="0" y="0" width="800" height="7" fill="#0f5257"/>
<text class="ur" x="400" y="46" text-anchor="middle" font-size="12.8" font-weight="normal" fill="#777777">عبادت و تزکیہ</text>
<text class="ur" x="400" y="84" text-anchor="middle" font-size="27.8" font-weight="bold" fill="#2d2d2d">زیرِ لب دہرائے گئے وہی الفاظ</text>
<circle cx="215.0" cy="214.6" r="23.6" fill="#0f5257"/><path d="M 172.5 311.4 a 42.5 54.3 0 0 1 85.0 0 Z" fill="#0f5257"/>
<text class="ur" x="215" y="348" text-anchor="middle" font-size="18.6" font-weight="bold" fill="#2d2d2d">یاد کرنے والا</text>
<text class="ur" x="215" y="372" text-anchor="middle" font-size="13.3" font-weight="normal" fill="#777777">پرانی ہاں دہراتا ہے</text>
<polygon points="585.0,195.7 598.2,231.9 636.6,233.2 606.3,256.9 616.9,293.9 585.0,272.4 553.1,293.9 563.7,256.9 533.4,233.2 571.8,231.9" fill="#0f5257"/>
<text class="ur" x="585" y="348" text-anchor="middle" font-size="18.6" font-weight="bold" fill="#2d2d2d">عہدِ الست</text>
<text class="ur" x="585" y="372" text-anchor="middle" font-size="13.3" font-weight="normal" fill="#777777">ایک بار، سب کے لیے</text>
<text class="ur" x="585" y="394" text-anchor="middle" font-size="13.3" font-weight="normal" fill="#777777">دیا گیا</text>
<line x1="300" y1="250" x2="490" y2="250" stroke="#0f5257" stroke-width="3" marker-end="url(#ar)"/>
<line x1="500" y1="288" x2="310" y2="288" stroke="#0f5257" stroke-width="2" stroke-dasharray="6 4" opacity="0.7" marker-end="url(#ar)"/>
<text class="ur" x="400" y="312" text-anchor="middle" font-size="12.8" font-weight="normal" fill="#777777">زبان وہی یاد دلاتی ہے جو روح نے مانا</text>
<text class="ur" x="400" y="236" text-anchor="middle" font-size="15.1" font-weight="bold" fill="#0f5257">ذکر — یاد کی تجدید</text>
<line x1="90" y1="492" x2="710" y2="492" stroke="#c9c2b4" stroke-width="1"/>
<text class="ur" x="400" y="526" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">ذکر وہ ہاں دوبارہ زبان پر لانا ہے جو ازل میں خاموشی سے ایک بار دی گئی — فطرت کی</text>
<text class="ur" x="400" y="553" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">الست کی بازگشت۔</text>
<text class="lat" x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#0f5257">Q7:172 — Am I not your Lord? They said, Yes</text>
</svg>
