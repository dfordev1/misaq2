<text class="ur" x="400" y="46" text-anchor="middle" font-size="12.8" font-weight="normal" fill="#777777">اضطرار و مشکل مسائل</text>
<text class="ur" x="400" y="84" text-anchor="middle" font-size="27.8" font-weight="bold" fill="#2d2d2d">کسان جس نے دشمن کا باغ نہ چھیڑا</text>
