<text class="ur" x="512" y="422" text-anchor="middle" font-size="13.9" font-weight="bold" fill="#2d2d2d">ہوں</text>
<line x1="90" y1="492" x2="710" y2="492" stroke="#c9c2b4" stroke-width="1"/>
<text class="ur" x="400" y="526" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">جنگ اس عہد کو ختم نہیں کرتی جو اس سے باہر والوں پر واجب ہے — غیرجنگی، فصل، کنواں</text>
<text class="ur" x="400" y="553" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">جنگ کے بیچ بھی محفوظ رہتے ہیں۔</text>
<text class="lat" x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#4a4a68">Bukhari, Kitab al-Jihad — prohibition on killing noncombatants</text>
