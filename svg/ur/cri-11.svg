<text class="ur" x="288" y="399" text-anchor="middle" font-size="13.9" font-weight="bold" fill="#2d2d2d">گھر مسمار نہ ہوں</text>
<rect x="412" y="311" width="200" height="128" rx="12" fill="#ffffff" stroke="#4a4a68" stroke-width="1.8"/>
