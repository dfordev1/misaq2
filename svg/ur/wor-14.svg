<text class="ur" x="400" y="526" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">شکر صرف غیرمعمولی نعمت کے لیے مخصوص نہیں — یہ عام، بے واقعہ دن کا بھی عہد کا معمول</text>
<text class="ur" x="400" y="553" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">حق ہے۔</text>
<text class="lat" x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#0f5257">Q14:7 — if you are grateful, I will surely increase you</text>
