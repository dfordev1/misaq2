<text class="ur" x="675" y="204" text-anchor="middle" font-size="13.9" font-weight="bold" fill="#faf8f3">امانت ٹوٹی — مدد</text>
<text class="ur" x="675" y="227" text-anchor="middle" font-size="13.9" font-weight="bold" fill="#faf8f3">لو</text>
<text class="ur" x="675" y="172" text-anchor="middle" font-size="12.2" font-weight="normal" fill="#777777">yes</text>
<line x1="510" y1="296" x2="596" y2="352" stroke="#2e6f40" stroke-width="2" marker-end="url(#ar)"/>
<rect x="600" y="322" width="150" height="62" rx="10" fill="#2e6f40" opacity="0.9"/>
<text class="ur" x="675" y="346" text-anchor="middle" font-size="13.9" font-weight="bold" fill="#faf8f3">امانت قائم، علاج</text>
<text class="ur" x="675" y="369" text-anchor="middle" font-size="13.9" font-weight="bold" fill="#faf8f3">جاری</text>
<text class="ur" x="675" y="314" text-anchor="middle" font-size="12.2" font-weight="normal" fill="#777777">no</text>
<line x1="90" y1="492" x2="710" y2="492" stroke="#c9c2b4" stroke-width="1"/>
<text class="ur" x="400" y="526" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">جسم کبھی تمہاری تباہی کے لیے نہ تھا — خود کو نقصان اسی امانت کو توڑتا ہے، اور رحمت</text>
<text class="ur" x="400" y="553" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">پھر بھی جدوجہد کرنے والے سے ملتی ہے۔</text>
<text class="lat" x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#2e6f40">Q4:29</text>
