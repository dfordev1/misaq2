<text class="ur" x="400" y="295" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#2e6f40">ہے؟</text>
<line x1="510" y1="236" x2="596" y2="210" stroke="#a33b2a" stroke-width="2" marker-end="url(#ar)"/>
