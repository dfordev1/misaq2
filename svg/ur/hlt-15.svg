<text class="ur" x="400" y="526" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">جسمانی قوت براہِ راست مومن سے مانگی گئی ہے — اس کی غفلت غیر جانبدار نہیں، امانت میں</text>
<text class="ur" x="400" y="553" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">سست خیانت ہے۔</text>
