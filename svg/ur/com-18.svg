<text class="ur" x="400" y="526" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">عوامی بینچ، پارک راستہ یا چوک نہ کسی کا ہے نہ سب کا — ہر استعمال کنندہ اسے ویسی ہی</text>
<text class="ur" x="400" y="553" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">نگہداشت کا مقروض ہے جیسے عاریتاً چیز کی۔</text>
<text class="lat" x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#a45c40">Muslim — removing harm from the road is a branch of faith</text>
