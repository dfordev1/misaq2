<text class="ur" x="400" y="526" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">جمع مال جس پر زکوٰۃ نہ دی جائے قیامت کے دن سخت وعید لاتا ہے۔ ذخیرہ اندوزی غریب کا</text>
