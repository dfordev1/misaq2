<text class="ur" x="400" y="480" text-anchor="middle" font-size="15.1" font-weight="bold" fill="#2d2d2d">اعتکاف ٹھہرنے سے نبھتا ہے، محض نیت سے نہیں</text>
<line x1="90" y1="492" x2="710" y2="492" stroke="#c9c2b4" stroke-width="1"/>
<text class="ur" x="400" y="526" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">اعتکاف کا عہد سخت حد رکھتا ہے — وقت کا ایک متعین حصہ، جان بوجھ کر الگ کر کے اپنے</text>
<text class="ur" x="400" y="553" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">مقصد کے لیے وقف۔</text>
<text class="lat" x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#a45c40">Q2:187 — do not approach them while you are in retreat in the mosques</text>
