<text class="ur" x="151" y="302" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#faf8f3">شدت جانچی</text>
<line x1="225" y1="275" x2="241" y2="275" stroke="#2d2d2d" stroke-width="2" marker-end="url(#ar)"/>
<rect x="247" y="200" width="140" height="150" rx="12" fill="#a45c40" opacity="0.70"/>
<circle cx="317.0" cy="250.0" r="27.3" fill="none" stroke="#faf8f3" stroke-width="5.6"/><line x1="317.0" y1="250.0" x2="317.0" y2="233.9" stroke="#faf8f3" stroke-width="4.3"/><line x1="317.0" y1="250.0" x2="329.4" y2="256.2" stroke="#faf8f3" stroke-width="4.3"/>
<text class="ur" x="317" y="302" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#faf8f3">ترتیب دی</text>
<line x1="391" y1="275" x2="407" y2="275" stroke="#2d2d2d" stroke-width="2" marker-end="url(#ar)"/>
<rect x="413" y="200" width="140" height="150" rx="12" fill="#a45c40" opacity="0.85"/>
<path d="M 452.0 258.7 L 476.8 240.1 L 489.2 240.1 L 514.0 258.7 L 504.1 268.6 L 483.0 253.7 L 461.9 268.6 Z" fill="#faf8f3"/>
<text class="ur" x="483" y="302" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#faf8f3">حد میں عمل</text>
<line x1="557" y1="275" x2="573" y2="275" stroke="#2d2d2d" stroke-width="2" marker-end="url(#ar)"/>
<rect x="579" y="200" width="140" height="150" rx="12" fill="#a45c40" opacity="1.00"/>
<path d="M 649.0 274.8 C 610.6 251.2 626.7 222.7 649.0 241.3 C 671.3 222.7 687.4 251.2 649.0 274.8 Z" fill="#faf8f3"/>
<text class="ur" x="649" y="302" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#faf8f3">نہ کر پانے پر</text>
<text class="ur" x="649" y="326" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#faf8f3">افسوس</text>
<text class="ur" x="400" y="392" text-anchor="middle" font-size="14.5" font-weight="normal" fill="#777777">سب حقوق ایک ساتھ نہیں نبھائے جا سکتے</text>
<line x1="90" y1="492" x2="710" y2="492" stroke="#c9c2b4" stroke-width="1"/>
<text class="ur" x="400" y="526" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">مسابقتی حقوق میں ترجیح دینا خود ایک عہدی نظم ہے — سب سے فوری کو پہلے دیکھیں، سب سے</text>
<text class="ur" x="400" y="553" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">مانوس کو نہیں۔</text>
<text class="lat" x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#a45c40">Q2:286 — no soul is burdened beyond capacity</text>
</svg>
