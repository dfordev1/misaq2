<text class="ur" x="400" y="526" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">غلط ثابت ہونے والا عوامی ریکارڈ اسی جگہ درست ہونا چاہیے، مٹا کر بھلایا نہیں جانا</text>
