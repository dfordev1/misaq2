<text class="ur" x="400" y="312" text-anchor="middle" font-size="12.8" font-weight="normal" fill="#777777">شفقت اور انصاف واجب</text>
<text class="ur" x="400" y="212" text-anchor="middle" font-size="15.1" font-weight="bold" fill="#6b4c9a">ذمہ — حفاظت کا</text>
<text class="ur" x="400" y="237" text-anchor="middle" font-size="15.1" font-weight="bold" fill="#6b4c9a">معاہدہ</text>
<line x1="90" y1="492" x2="710" y2="492" stroke="#c9c2b4" stroke-width="1"/>
<text class="ur" x="400" y="526" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">ذمے کا معاہدہ اکثریت کو پابند کرتا ہے کہ اقلیت کی جان، عبادت اور مال کی حفاظت کرے،</text>
<text class="ur" x="400" y="553" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">بدلے میں ان کی قانون سے وفاداری کے عوض۔</text>
<text class="lat" x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#6b4c9a">Q60:8</text>
