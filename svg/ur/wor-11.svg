<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" width="800" height="620" font-family="'Noto Nastaliq Urdu', 'Urdu Typesetting', serif">
<defs><style>text{font-family:'Noto Nastaliq Urdu', 'Urdu Typesetting', serif;direction:rtl;unicode-bidi:isolate;}text.lat{font-family:Georgia, 'Noto Serif', serif;direction:ltr;}</style><marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2d2d2d"/></marker></defs>
<rect x="0" y="0" width="800" height="620" fill="#faf8f3"/>
<rect x="0" y="0" width="800" height="7" fill="#a45c40"/>
<text class="ur" x="400" y="46" text-anchor="middle" font-size="12.8" font-weight="normal" fill="#777777">عبادت و تزکیہ</text>
<text class="ur" x="400" y="84" text-anchor="middle" font-size="27.8" font-weight="bold" fill="#2d2d2d">روز تھوڑا، مہینے میں ایک بار زیادہ</text>
<text class="ur" x="400" y="131" text-anchor="middle" font-size="27.8" font-weight="bold" fill="#2d2d2d">سے بہتر</text>
<rect x="70" y="130" width="310" height="316" rx="14" fill="#ffffff" stroke="#a33b2a" stroke-width="2" opacity="0.95"/>
<text class="ur" x="225" y="162" text-anchor="middle" font-size="17.4" font-weight="bold" fill="#a33b2a">✗  یکبارگی</text>
<circle cx="225.0" cy="252.0" r="44.0" fill="none" stroke="#a33b2a" stroke-width="9.0"/><line x1="225.0" y1="252.0" x2="225.0" y2="226.0" stroke="#a33b2a" stroke-width="7.0"/><line x1="225.0" y1="252.0" x2="245.0" y2="262.0" stroke="#a33b2a" stroke-width="7.0"/>
<text class="ur" x="225" y="336" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">ایک بار پورا زور، پھر</text>
<text class="ur" x="225" y="361" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">کچھ نہیں</text>
<text class="ur" x="225" y="378" text-anchor="middle" font-size="13.3" font-weight="normal" fill="#777777">عہد وقفے وقفے سے</text>
<rect x="420" y="130" width="310" height="316" rx="14" fill="#ffffff" stroke="#2e6f40" stroke-width="2" opacity="0.95"/>
<text class="ur" x="575" y="162" text-anchor="middle" font-size="17.4" font-weight="bold" fill="#2e6f40">✓  استقامت</text>
<circle cx="575.0" cy="252.0" r="44.0" fill="none" stroke="#2e6f40" stroke-width="9.0"/><line x1="575.0" y1="252.0" x2="575.0" y2="226.0" stroke="#2e6f40" stroke-width="7.0"/><line x1="575.0" y1="252.0" x2="595.0" y2="262.0" stroke="#2e6f40" stroke-width="7.0"/>
<text class="ur" x="575" y="336" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">روزانہ چھوٹا عمل</text>
<text class="ur" x="575" y="361" text-anchor="middle" font-size="13.3" font-weight="normal" fill="#777777">عہد تسلسل میں قائم</text>
<line x1="400" y1="140" x2="400" y2="436" stroke="#c9c2b4" stroke-dasharray="5 5"/>
<line x1="90" y1="492" x2="710" y2="492" stroke="#c9c2b4" stroke-width="1"/>
<text class="ur" x="400" y="526" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">عہد تسلسل کو شدت پر ترجیح دیتا ہے — روزانہ کیا چھوٹا عمل ایک بار کیے بڑے اور چھوڑے</text>
<text class="ur" x="400" y="553" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">گئے عمل سے بڑھ کر ہے۔</text>
<text class="lat" x="400" y="602" text-anchor="middle" font-size="12.0" font-weight="bold" fill="#a45c40">Bukhari, Kitab al-Riqaq — the most beloved deeds are the most consistent</text>
</svg>
