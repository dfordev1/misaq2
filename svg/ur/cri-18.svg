<text class="ur" x="400" y="526" text-anchor="middle" font-size="15.1" font-weight="normal" fill="#2d2d2d">جو ادارہ چپکے سے وہ بیچ دے جس کی نگہبانی سونپی گئی تھی، وہی امانت شکنی کرتا ہے جو</text>
