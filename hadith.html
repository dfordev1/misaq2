<main class="wrap hub-main">
  <div class="rule hub-rule"></div>
  <h1 class="hub-title">Hadith notes</h1>
  <p class="hub-lede">Fifty covenant-themed hadith dossiers (H01–H50).</p>
  <div class="hub-table-wrap"><table class="hub-table" id="had-table">
    <thead><tr><th>ID</th><th>Title</th><th>Grade</th><th>Collections</th><th>Theme</th></tr></thead>
    <tbody></tbody>
  </table></div>
</main>
<script>
(async function(){
  const d = await (await fetch('data/hadith.json')).json();
  const tb = document.querySelector('#had-table tbody');
  d.entries.forEach(h=>{
    const tr = document.createElement('tr');
    tr.innerHTML = '<td><code>'+h.id+'</code></td><td>'+h.title+'</td><td>'+h.grade+'</td><td>'+h.collections+'</td><td>'+h.theme+'</td>';
    tb.appendChild(tr);
  });
})();
</script>
<footer class="bot"><div class="wrap">
