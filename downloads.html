<main class="wrap hub-main">
  <div class="rule hub-rule"></div>
  <h1 class="hub-title">Downloads</h1>
  <p class="hub-lede" id="dl-intro">Optional PDFs if you prefer offline reading. The website alone is enough to begin.</p>
  <div class="hub-dl" id="dl-grid"></div>
</main>
<footer class="bot"><div class="wrap">
  <p>Every diagram and note here is an ijtihādī study aid, not a fatwā.</p>
</div></footer>
<script src="app.js"></script>
<script>
(async function(){
  const d = await (await fetch('data/downloads.json')).json();
  const ur = CT.lang()==='ur';
  document.querySelector('.hub-title').textContent = ur ? d.title_ur : d.title_en;
  document.getElementById('dl-intro').textContent = ur
    ? 'PDF کتابیں اور خاکوں کے مجموعے۔'
    : 'PDF books and diagram collections.';
  const g = document.getElementById('dl-grid');
  if (!d.items.length) { g.innerHTML = '<p class="empty">No PDFs synced yet.</p>'; return; }
  d.items.forEach(it=>{
    const a = document.createElement('a');
    a.className = 'hub-dl-card';
    a.href = 'downloads/'+it.file;
    a.download = it.file;
    const mb = (it.bytes/1048576).toFixed(1);
    a.innerHTML = '<h3>'+(ur?it.title_ur:it.title_en)+'</h3><p>'+(ur?(it.blurb_ur||it.blurb_en):it.blurb_en)+'</p><span class="hub-dl-meta">PDF · '+mb+' MB</span>';
    g.appendChild(a);
  });
})();
</script>
</body>
</html>
